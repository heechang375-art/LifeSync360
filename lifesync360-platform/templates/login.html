<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인 – LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <p class="auth-logo">LifeSync<span>360</span></p>
    <p class="auth-sub">건강과 금융을 하나로</p>

    <div class="auth-card">
        <h2>로그인</h2>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="email" placeholder="example@email.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요">
        </div>
        <p class="error-msg" id="error-msg"></p>
        <button class="btn-primary" id="login-btn">로그인</button>
    </div>

    <p class="auth-link">계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a></p>
</div>

<script>
    document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('error-msg');
        errEl.textContent = '';
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            let data;
            try {
                data = await res.json();
            } catch (_) {
                errEl.textContent = `서버 응답 오류 (status: ${res.status})`;
                return;
            }
            if (!res.ok) {
                errEl.textContent = (data.detail ? `${data.error} — ${data.detail}` : data.error) || `로그인 실패 (status: ${res.status})`;
                return;
            }
            localStorage.setItem('ls_token', data.token);
            window.location.href = '/';
        } catch (e) {
            errEl.textContent = `네트워크 오류: ${e.message}`;
        }
    });
</script>
</body>
</html>
