<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-inner">
            <span class="grade-badge" id="grade-badge">-</span>
            <span class="logo" id="header-logo">LifeSync<span>360</span></span>
            <a class="header-username" id="header-username" href="/settings">-</a>
        </div>
    </header>

    <main class="content">

        <!-- ── 홈 탭 ── -->
        <section id="tab-home" class="tab-content active">
            <div>
                <div class="score-card">
                    <div class="score-left">
                        <svg viewBox="0 0 100 100" class="circle-svg">
                            <circle cx="50" cy="50" r="44" class="circle-bg"/>
                            <circle cx="50" cy="50" r="44" class="circle-fill" id="score-arc" style="--score: 0"/>
                        </svg>
                        <div class="score-text">
                            <span class="score-num" id="score-num">-</span>
                        </div>
                    </div>
                    <div class="score-right">
                        <span class="score-label" id="score-label">종합점수</span>
                        <div class="score-toggle">
                            <button class="toggle-btn active" data-score="0" data-label="종합점수">종합</button>
                            <button class="toggle-btn" data-score="0" data-label="건강점수">건강</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 홈 추천 미리보기 -->
            <div id="home-rec-section">
                <div class="home-rec-header">
                    <span class="home-rec-title">나를 위한 추천</span>
                    <button class="home-rec-more" onclick="switchToRecommendTab()">전체보기</button>
                </div>
                <div class="home-rec-cats" id="home-rec-cats"></div>
            </div>
        </section>

        <!-- ── 추천 탭 (JS 가 innerHTML 로 채움) ── -->
        <section id="tab-recommend" class="tab-content"></section>

        <!-- ── MY 탭 ── -->
        <section id="tab-my" class="tab-content">
            <!-- Next Best Action 카드 (DynamoDB next_best_action) -->
            <div id="nba-section" style="display:none; margin: 16px; padding: 16px; border-radius: 12px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white;">
                <div style="font-size: 12px; opacity: 0.9; margin-bottom: 6px;">🎯 AI 추천 다음 액션</div>
                <div id="nba-text" style="font-size: 16px; font-weight: 600;">-</div>
            </div>

            <!-- 신청 내역 (customer_product_application JOIN product/company/category) -->
            <div style="margin: 16px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-size:15px; font-weight:700; color:#0f172a;">📄 내 신청 내역</span>
                    <span id="my-applications-count" style="font-size:12px; color:#94a3b8;"></span>
                </div>
                <div id="my-applications-list" style="display:flex; flex-direction:column; gap:10px;">
                    <div style="padding:14px; color:#94a3b8; font-size:13px; text-align:center; background:#fff; border:1px solid #e2e8f0; border-radius:12px;">불러오는 중...</div>
                </div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="home">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>홈</span>
        </button>
        <button class="nav-btn" data-tab="recommend">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span>추천</span>
        </button>
        <button class="nav-btn" data-tab="my">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span>MY</span>
        </button>
    </nav>

    <!-- 건강점수 상세 모달 -->
    <div class="modal-backdrop hidden" id="health-modal">
        <div class="modal-card">
            <div class="modal-header">
                <span class="modal-title">건강점수 상세</span>
                <button class="modal-close" onclick="closeHealthModal()">✕</button>
            </div>
            <div id="modal-breakdown"></div>
        </div>
    </div>
</div>

<script>
    let _breakdown = [];

    (async () => {
        const token = localStorage.getItem('ls_token');
        if (!token) { window.location.href = '/login'; return; }
        const headers = { 'Authorization': `Bearer ${token}` };

        const [meRes, dashRes, recRes, appsRes] = await Promise.all([
            fetch('/api/me', { headers }),
            fetch('/api/dashboard', { headers }),
            fetch('/api/recommendations', { headers }),
            fetch('/api/my-applications', { headers }),
        ]);

        if (!meRes.ok) { window.location.href = '/login'; return; }
        const user = await meRes.json();
        const _grade = user.grade || 'BASIC';
        document.getElementById('grade-badge').textContent = _grade;
        document.getElementById('grade-badge').className = `grade-badge grade-${_grade.toLowerCase()}`;
        document.getElementById('header-username').textContent = user.name || '-';

        if (dashRes.ok) {
            const scores = await dashRes.json();
            if (!scores.no_data) {
                const scoreMap = {
                    '종합점수': scores.dynamic_score,
                    '건강점수': scores.health_score,
                };
                document.querySelectorAll('.toggle-btn').forEach(btn => {
                    const v = scoreMap[btn.dataset.label];
                    if (v != null) btn.dataset.score = v;
                });
                const active = document.querySelector('.toggle-btn.active');
                if (active) {
                    document.getElementById('score-num').textContent = active.dataset.score;
                    document.getElementById('score-arc').style.setProperty('--score', active.dataset.score);
                }
                if (scores.breakdown) _breakdown = scores.breakdown;
                // Next Best Action 카드
                if (scores.next_best_action) {
                    document.getElementById('nba-text').textContent = scores.next_best_action;
                    document.getElementById('nba-section').style.display = '';
                }
            }
        }

        if (recRes.ok) {
            const data = await recRes.json();
            // 신규 응답 호환: {meta, products}. 구 응답 (list) 도 호환.
            const products = Array.isArray(data) ? data : (data.products || []);
            const meta     = (data && !Array.isArray(data)) ? (data.meta || {}) : {};

            // meta.next_best_action → NBA 카드 (dashboard 응답에 없을 때만 fallback)
            const nbaEl = document.getElementById('nba-text');
            if (meta.next_best_action && nbaEl && nbaEl.textContent === '-') {
                nbaEl.textContent = meta.next_best_action;
                document.getElementById('nba-section').style.display = '';
            }

            // [Home 탭] 계열사 분리 X — 상위 6개 카드형 (rank + reason + score)
            const homeContainer = document.getElementById('home-rec-cats');
            homeContainer.innerHTML = '';
            const homeTop = products.slice(0, 6);
            if (homeTop.length === 0) {
                homeContainer.innerHTML = '<div style="padding:14px;color:#94a3b8;font-size:13px;text-align:center;">추천 상품이 준비되는 중이에요</div>';
            } else {
                const rankColor = (i) => i === 0 ? '#ef4444' : i === 1 ? '#f59e0b' : i === 2 ? '#10b981' : '#94a3b8';
                homeContainer.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:flex-end;padding:0 4px 10px;">
                        <div>
                            <div style="font-size:15px;font-weight:700;color:#0f172a;">🎁 나를 위한 맞춤 추천</div>
                            <div style="font-size:12px;color:#94a3b8;margin-top:2px;">recommend_rule + cross_sell + NBA 매칭 · ${products.length}건</div>
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:10px;">
                    ${homeTop.map((p, i) => `
                        <a href="/product/${p.product_code}"
                           onclick="emitEvent('recommendation_click', '${(p.product_name||'').replace(/'/g,'\\\\\'')}')"
                           style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;cursor:pointer;text-decoration:none;color:#0f172a;box-shadow:0 1px 2px rgba(0,0,0,.03);">
                            <div style="flex-shrink:0;width:32px;height:32px;border-radius:8px;background:${rankColor(i)};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;">${i+1}</div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:2px;">${p.product_name}</div>
                                <div style="font-size:12px;color:#475569;line-height:1.4;">💡 ${p.reason || (p.category_name || '') + ' 카테고리 매칭'}</div>
                            </div>
                            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
                                <span style="padding:2px 8px;font-size:11px;border-radius:999px;background:#eff6ff;color:#1e40af;">${p.category_name || p.category_code || ''}</span>
                                ${p.recommendation_score ? `<span style="font-size:11px;color:#94a3b8;">점수 ${p.recommendation_score}</span>` : ''}
                            </div>
                        </a>
                    `).join('')}
                    </div>
                `;
            }

            // [Recommend 탭] 계열사 분리 X — 단일 panel 에 전체 list 채움
            const tabRec = document.getElementById('tab-recommend');
            if (tabRec) {
                tabRec.innerHTML = `
                    <div style="padding: 12px 16px; color:#475569; font-size:13px;">
                        총 <strong>${products.length}</strong>개 맞춤 상품
                        ${meta.grade ? `· 등급 <strong>${meta.grade}</strong>` : ''}
                        ${meta.score != null ? `· 점수 <strong>${Number(meta.score).toFixed(1)}</strong>` : ''}
                    </div>
                    <div class="rank-list">
                        ${products.length === 0
                            ? '<div style="padding:24px;color:#94a3b8;text-align:center;">추천 상품이 준비되는 중이에요</div>'
                            : products.map((p, i) => `
                                <a class="rank-item" href="/product/${p.product_code}">
                                    <span class="rank-num rank-${Math.min(i + 1, 3)}">${i + 1}</span>
                                    <div class="rank-info">
                                        <span class="rank-meta">${p.company_name || p.company_code || ''} · ${p.category_name || p.category_code || ''}</span>
                                        <p class="rank-name">${p.product_name}</p>
                                        <p class="rank-desc">${(p.description || '').slice(0, 80)}</p>
                                    </div>
                                </a>
                            `).join('')
                        }
                    </div>
                `;
                // 동적 렌더 후 click 핸들러 재바인딩
                tabRec.querySelectorAll('.rank-item').forEach(a => {
                    a.addEventListener('click', () => {
                        const name = a.querySelector('.rank-name')?.textContent.trim();
                        if (name) emitEvent('recommendation_click', name);
                    });
                });
            }
        }
    })();

    function openHealthModal() {
        document.getElementById('modal-breakdown').innerHTML = _breakdown.map(b =>
            `<div class="modal-breakdown-item">
                <div class="modal-breakdown-header">
                    <span class="modal-breakdown-label">${b.label}</span>
                    <span class="modal-breakdown-score">${b.score}<span class="modal-breakdown-max">/${b.max}</span></span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(b.score/b.max*100)}%"></div></div>
            </div>`
        ).join('');
        document.getElementById('health-modal').classList.remove('hidden');
    }

    function closeHealthModal() {
        document.getElementById('health-modal').classList.add('hidden');
    }

    document.getElementById('health-modal').addEventListener('click', function(e) {
        if (e.target === this) closeHealthModal();
    });

    function switchToRecommendTab() {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelector('.nav-btn[data-tab="recommend"]').classList.add('active');
        document.getElementById('tab-recommend').classList.add('active');
    }

    document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            emitEvent('tab_click', btn.dataset.tab);
        });
    });

    // session_id 일관 — 탭 단위로 sessionStorage 유지
    function getSessionId() {
        let sid = sessionStorage.getItem('ls_session_id');
        if (!sid) {
            sid = 'S-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
            sessionStorage.setItem('ls_session_id', sid);
        }
        return sid;
    }

    function emitEvent(eventType, eventTarget, productId) {
        const token = localStorage.getItem('ls_token');
        if (!token) return;
        fetch('/api/event', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                event_type:   eventType,
                event_target: eventTarget,
                product_id:   productId || null,
                session_id:   getSessionId(),
            }),
        }).catch(() => {});
    }

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('score-num').textContent = btn.dataset.score;
            document.getElementById('score-label').textContent = btn.dataset.label;
            document.getElementById('score-arc').style.setProperty('--score', btn.dataset.score);
            if (btn.dataset.label === '건강점수' && _breakdown.length) openHealthModal();
        });
    });
</script>
</body>
</html>
