<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-inner">
            <span class="grade-badge" id="grade-badge">-</span>
            <span class="logo" id="header-logo">LifeSync<span>360</span></span>
            <a class="header-username" id="header-username" href="/settings">-</a>
        </div>
    </header>

    <main class="content">

        <!-- ── 홈 탭 ── -->
        <section id="tab-home" class="tab-content active">
            <div>
                <div class="score-card">
                    <div class="score-left">
                        <svg viewBox="0 0 100 100" class="circle-svg">
                            <circle cx="50" cy="50" r="44" class="circle-bg"/>
                            <circle cx="50" cy="50" r="44" class="circle-fill" id="score-arc" style="--score: 0"/>
                        </svg>
                        <div class="score-text">
                            <span class="score-num" id="score-num">-</span>
                        </div>
                    </div>
                    <div class="score-right">
                        <span class="score-label" id="score-label">종합점수</span>
                        <div class="score-toggle">
                            <button class="toggle-btn active" data-score="0" data-label="종합점수">종합</button>
                            <button class="toggle-btn" data-score="0" data-label="건강점수">건강</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 건강 지표 -->
            <div class="health-indicators" id="health-indicators"></div>

            <!-- 홈 추천 미리보기 -->
            <div id="home-rec-section">
                <div class="home-rec-header">
                    <span class="home-rec-title">나를 위한 추천</span>
                    <button class="home-rec-more" onclick="switchToRecommendTab()">전체보기</button>
                </div>
                <div class="home-rec-cats" id="home-rec-cats"></div>
            </div>
        </section>

        <!-- ── 추천 탭 ── -->
        <section id="tab-recommend" class="tab-content">
            <div class="company-tabs">
                {% for rec in recommendations %}
                <button class="company-btn {% if loop.first %}active{% endif %}" data-rec="{{ loop.index0 }}">{{ rec.name }}</button>
                {% endfor %}
            </div>
            {% for rec in recommendations %}
            <div class="company-panel {% if loop.first %}active{% endif %}" id="rec-{{ loop.index0 }}">
                <div class="rank-list">
                    {% for p in rec.products %}
                    <a class="rank-item" href="/product/{{ p.id }}">
                        <span class="rank-num rank-{{ loop.index }}">{{ loop.index }}</span>
                        <div class="rank-info">
                            <span class="rank-meta">{{ rec.name }} · {{ p.type }}</span>
                            <p class="rank-name">{{ p.name }}</p>
                            <p class="rank-desc">{{ p.desc }}</p>
                        </div>
                    </a>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
        </section>

        <!-- ── MY 탭 ── -->
        <section id="tab-my" class="tab-content">
            <div class="my-section-card">
                <div class="my-section-title">소비 패턴</div>
                <div id="spending-bars">
                    <p class="spending-placeholder">데이터를 불러오는 중...</p>
                </div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="home">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>홈</span>
        </button>
        <button class="nav-btn" data-tab="recommend">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span>추천</span>
        </button>
        <button class="nav-btn" data-tab="my">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span>MY</span>
        </button>
    </nav>

    <!-- 건강점수 상세 모달 -->
    <div class="modal-backdrop hidden" id="health-modal">
        <div class="modal-card">
            <div class="modal-header">
                <span class="modal-title">건강점수 상세</span>
                <button class="modal-close" onclick="closeHealthModal()">✕</button>
            </div>
            <div id="modal-breakdown"></div>
        </div>
    </div>
</div>

<script>
    let _breakdown = [];

    (async () => {
        const token = localStorage.getItem('ls_token');
        if (!token) { window.location.href = '/login'; return; }
        const headers = { 'Authorization': `Bearer ${token}` };

        const [meRes, dashRes, recRes] = await Promise.all([
            fetch('/api/me', { headers }),
            fetch('/api/dashboard', { headers }),
            fetch('/api/recommendations', { headers }),
        ]);

        if (!meRes.ok) { window.location.href = '/login'; return; }
        const user = await meRes.json();
        const _grade = user.grade || 'BASIC';
        document.getElementById('grade-badge').textContent = _grade;
        document.getElementById('grade-badge').className = `grade-badge grade-${_grade.toLowerCase()}`;
        document.getElementById('header-username').textContent = user.name || '-';

        if (dashRes.ok) {
            const scores = await dashRes.json();
            if (!scores.no_data) {
                const scoreMap = {
                    '종합점수': scores.dynamic_score,
                    '건강점수': scores.health_score,
                };
                document.querySelectorAll('.toggle-btn').forEach(btn => {
                    const v = scoreMap[btn.dataset.label];
                    if (v != null) btn.dataset.score = v;
                });
                const active = document.querySelector('.toggle-btn.active');
                if (active) {
                    document.getElementById('score-num').textContent = active.dataset.score;
                    document.getElementById('score-arc').style.setProperty('--score', active.dataset.score);
                }
                if (scores.indicators) {
                    const indLabels = { NORMAL: '정상', CAUTION: '주의', DANGER: '위험' };
                    document.getElementById('health-indicators').innerHTML = scores.indicators.map(ind =>
                        `<div class="indicator-pill status-${ind.status.toLowerCase()}">${ind.label}<span>${indLabels[ind.status]}</span></div>`
                    ).join('');
                }
                if (scores.breakdown) _breakdown = scores.breakdown;
                if (scores.spending) {
                    document.getElementById('spending-bars').innerHTML = scores.spending.map(s =>
                        `<div class="spend-item"><div class="spend-header"><span class="spend-label">${s.label}</span><span class="spend-pct">${s.pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%"></div></div></div>`
                    ).join('');
                }
            }
        }

        if (recRes.ok) {
            const recs = await recRes.json();
            const SHOW_CATS = ['bank', 'card', 'insurance'];
            const container = document.getElementById('home-rec-cats');
            const filtered = recs.filter(r => SHOW_CATS.includes(r.key));
            filtered.forEach(cat => {
                const topProducts = cat.products.slice(0, 2);
                const catEl = document.createElement('div');
                catEl.className = 'home-rec-cat';
                catEl.innerHTML = `
                    <div class="home-rec-cat-label">${cat.name}</div>
                    ${topProducts.map(p => `
                        <a class="home-rec-item" href="/product/${p.id}" onclick="emitEvent('recommendation_click', this.querySelector('.home-rec-item-name').textContent)">
                            <span class="home-rec-item-name">${p.name}</span>
                            ${p.tag ? `<span class="home-rec-item-tag">${p.tag}</span>` : ''}
                        </a>
                    `).join('')}
                `;
                container.appendChild(catEl);
            });
        }
    })();

    function openHealthModal() {
        document.getElementById('modal-breakdown').innerHTML = _breakdown.map(b =>
            `<div class="modal-breakdown-item">
                <div class="modal-breakdown-header">
                    <span class="modal-breakdown-label">${b.label}</span>
                    <span class="modal-breakdown-score">${b.score}<span class="modal-breakdown-max">/${b.max}</span></span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(b.score/b.max*100)}%"></div></div>
            </div>`
        ).join('');
        document.getElementById('health-modal').classList.remove('hidden');
    }

    function closeHealthModal() {
        document.getElementById('health-modal').classList.add('hidden');
    }

    document.getElementById('health-modal').addEventListener('click', function(e) {
        if (e.target === this) closeHealthModal();
    });

    function switchToRecommendTab() {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelector('.nav-btn[data-tab="recommend"]').classList.add('active');
        document.getElementById('tab-recommend').classList.add('active');
    }

    document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            emitEvent('tab_click', btn.dataset.tab);
        });
    });

    document.querySelectorAll('#tab-recommend .company-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#tab-recommend .company-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#tab-recommend .company-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`rec-${btn.dataset.rec}`).classList.add('active');
            emitEvent('tab_click', btn.textContent.trim());
        });
    });

    document.querySelectorAll('#tab-recommend .rank-item').forEach(a => {
        a.addEventListener('click', () => {
            const name = a.querySelector('.rank-name')?.textContent.trim();
            if (name) emitEvent('recommendation_click', name);
        });
    });

    function emitEvent(eventType, eventTarget) {
        const token = localStorage.getItem('ls_token');
        if (!token) return;
        fetch('/api/event', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_type: eventType, event_target: eventTarget }),
        }).catch(() => {});
    }

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('score-num').textContent = btn.dataset.score;
            document.getElementById('score-label').textContent = btn.dataset.label;
            document.getElementById('score-arc').style.setProperty('--score', btn.dataset.score);
            if (btn.dataset.label === '건강점수' && _breakdown.length) openHealthModal();
        });
    });
</script>
</body>
</html>
