<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ item.name }} – LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-inner">
            <button class="back-btn" onclick="history.back()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <span class="header-title">{{ item.category }}</span>
            <span></span>
        </div>
    </header>

    <main class="content" style="padding-bottom: 100px;">
        <div class="product-hero">
            <span class="chip-type">{{ item.type }}</span>
            {% if item.tag %}<span class="chip-tag {% if item.tag == '맞춤추천' %}tag-primary{% else %}tag-secondary{% endif %}">{{ item.tag }}</span>{% endif %}
            <h1 class="product-name">{{ item.name }}</h1>
            <p class="product-desc">{{ item.desc }}</p>
        </div>

        <div class="product-detail-card">
            <p class="detail-heading">주요 혜택</p>
            <ul class="detail-list-items">
                {% for d in item.detail %}
                <li>{{ d }}</li>
                {% endfor %}
            </ul>
        </div>
    </main>

    <div class="product-cta">
        <button class="btn-primary" id="apply-btn">신청하기</button>
    </div>
</div>

<script>
    const PRODUCT_ID = {{ item.product_id | default('null') }};

    function getSessionId() {
        let sid = sessionStorage.getItem('ls_session_id');
        if (!sid) {
            sid = 'S-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
            sessionStorage.setItem('ls_session_id', sid);
        }
        return sid;
    }
    function emitEvent(type, target) {
        const token = localStorage.getItem('ls_token');
        if (!token) return;
        const body = { event_type: type, event_target: target, session_id: getSessionId() };
        if (PRODUCT_ID) body.product_id = PRODUCT_ID;
        fetch('/api/event', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        }).catch(() => {});
    }
    emitEvent('product_view', '{{ item.name | e }}');
    document.getElementById('apply-btn').addEventListener('click', () => {
        emitEvent('apply_started', '{{ item.name | e }}');
        window.location.href = '/product/{{ item.id }}/apply';
    });
</script>
</body>
</html>
