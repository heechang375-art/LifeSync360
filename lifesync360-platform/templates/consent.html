<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>데이터 활용 동의 – LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .consent-page { max-width: 560px; margin: 0 auto; padding: 24px 16px 96px; }
        .consent-header { text-align: center; margin-bottom: 20px; }
        .consent-header .logo { font-size: 28px; font-weight: 800; color: #1e40af; }
        .consent-header .logo span { color: #3b82f6; }
        .consent-header .sub { color: #64748b; font-size: 14px; margin-top: 6px; }
        .consent-toolbar { display: flex; justify-content: space-between; align-items: center;
                           padding: 12px 16px; background: #f1f5f9; border-radius: 12px; margin-bottom: 14px; }
        .consent-toolbar .count { font-weight: 600; color: #1e40af; }
        .consent-toolbar button { padding: 6px 14px; font-size: 13px; border: 1px solid #cbd5e1;
                                  background: #fff; border-radius: 8px; cursor: pointer; }
        .consent-card { display: flex; gap: 12px; padding: 16px; margin-bottom: 12px;
                        background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
                        transition: all .15s; cursor: pointer; position: relative; }
        .consent-card.checked { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 2px 8px rgba(59,130,246,.12); }
        .consent-card .icon { font-size: 28px; line-height: 1; flex-shrink: 0; width: 44px; height: 44px;
                              background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .consent-card.checked .icon { background: #dbeafe; }
        .consent-card .body { flex: 1; min-width: 0; padding-right: 28px; }
        .consent-card .label { font-weight: 700; color: #0f172a; font-size: 15px; margin-bottom: 4px; }
        .consent-card .desc { color: #475569; font-size: 13px; line-height: 1.5; margin-bottom: 6px; }
        .consent-card .scope { color: #94a3b8; font-size: 12px; }
        .consent-card .scope::before { content: '수집 항목: '; color: #64748b; font-weight: 500; }
        .consent-card input[type=checkbox] { position: absolute; top: 16px; right: 16px;
                                              width: 20px; height: 20px; cursor: pointer; accent-color: #3b82f6; }
        .consent-notice { background: #fffbeb; border: 1px solid #fde68a; color: #78350f;
                          padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; margin-top: 14px; }
        .consent-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px 20px;
                       background: linear-gradient(to top, #fff 80%, rgba(255,255,255,0)); }
        .consent-cta button { width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
                              background: #3b82f6; color: #fff; border: 0; border-radius: 12px; cursor: pointer; }
        .consent-cta button:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="consent-page">
    <div class="consent-header">
        <p class="logo">LifeSync<span>360</span></p>
        <p class="sub">맞춤 서비스 제공을 위해 데이터 활용 동의가 필요해요</p>
    </div>

    <div class="consent-toolbar">
        <span class="count"><strong id="checked-count">0</strong> / {{ consents|length }} 선택</span>
        <button id="select-all-btn">전체 선택</button>
    </div>

    <div class="consent-list">
        {% for item in consents %}
        <label class="consent-card" for="{{ item.key }}">
            <div class="icon">{{ item.icon }}</div>
            <div class="body">
                <div class="label">{{ item.label }}</div>
                <div class="desc">{{ item.desc }}</div>
                <div class="scope">{{ item.scope }}</div>
            </div>
            <input type="checkbox" id="{{ item.key }}" name="{{ item.key }}">
        </label>
        {% endfor %}
    </div>

    <div class="consent-notice">
        최소 1개 이상 동의 시 서비스를 이용할 수 있습니다.<br>
        동의 정보는 언제든 마이페이지에서 철회할 수 있으며, 철회 시 해당 계열사 기반 추천은 즉시 중단됩니다.
    </div>
</div>

<div class="consent-cta">
    <button id="consent-btn" disabled>저장 후 시작하기</button>
</div>

<script>
    const token = localStorage.getItem('ls_token');
    if (!token) window.location.href = '/login';

    const boxes        = [...document.querySelectorAll('input[type=checkbox]')];
    const countEl      = document.getElementById('checked-count');
    const submitBtn    = document.getElementById('consent-btn');
    const selectAllBtn = document.getElementById('select-all-btn');

    function refresh() {
        const checked = boxes.filter(b => b.checked);
        countEl.textContent = checked.length;
        submitBtn.disabled  = checked.length === 0;
        boxes.forEach(b => b.closest('.consent-card').classList.toggle('checked', b.checked));
        selectAllBtn.textContent = checked.length === boxes.length ? '전체 해제' : '전체 선택';
    }

    const saved = JSON.parse(localStorage.getItem('ls_consents') || '[]');
    if (saved.length > 0) boxes.forEach(el => el.checked = saved.includes(el.id));
    refresh();

    boxes.forEach(b => b.addEventListener('change', refresh));
    selectAllBtn.addEventListener('click', () => {
        const next = boxes.some(b => !b.checked);
        boxes.forEach(b => b.checked = next);
        refresh();
    });

    submitBtn.addEventListener('click', async () => {
        const checked = boxes.filter(b => b.checked).map(b => b.id);
        if (checked.length === 0) return;
        localStorage.setItem('ls_consents', JSON.stringify(checked));
        submitBtn.disabled = true;
        submitBtn.textContent = '저장 중...';
        try {
            await fetch('/api/consent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ consents: checked }),
            });
            window.location.href = '/';
        } catch (e) {
            submitBtn.disabled = false;
            submitBtn.textContent = '저장 후 시작하기';
            alert('동의 저장에 실패했어요. 다시 시도해 주세요.');
        }
    });
</script>
</body>
</html>
