<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>데이터 활용 동의 – LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <p class="auth-logo">LifeSync<span>360</span></p>
    <p class="auth-sub">맞춤 서비스를 위해 동의가 필요해요</p>

    <div class="auth-card">
        <h2>데이터 활용 동의</h2>
        <button class="btn-outline" id="select-all-btn" style="width:100%;margin-bottom:12px;">전체 선택</button>
        <div class="consent-list">
            {% for item in consents %}
            <div class="consent-item">
                <label for="{{ item.key }}">{{ item.label }}</label>
                <input type="checkbox" id="{{ item.key }}" name="{{ item.key }}">
            </div>
            {% endfor %}
        </div>
        <p class="consent-notice">
            최소 1개 이상 동의 시 서비스를 이용할 수 있습니다.<br>
            동의하신 계열사 데이터를 기반으로 맞춤 건강·금융 서비스를 제공합니다.
        </p>
        <button class="btn-primary" id="consent-btn">저장 후 시작하기</button>
    </div>
</div>

<script>
    const token = localStorage.getItem('ls_token');
    if (!token) window.location.href = '/login';

    // 이전에 저장된 동의 상태 복원
    const saved = JSON.parse(localStorage.getItem('ls_consents') || '[]');
    if (saved.length > 0) {
        document.querySelectorAll('input[type=checkbox]').forEach(el => {
            el.checked = saved.includes(el.id);
        });
    }

    // 전체 선택/해제
    let allSelected = false;
    document.getElementById('select-all-btn').addEventListener('click', () => {
        allSelected = !allSelected;
        document.querySelectorAll('input[type=checkbox]').forEach(el => el.checked = allSelected);
        document.getElementById('select-all-btn').textContent = allSelected ? '전체 해제' : '전체 선택';
    });

    document.getElementById('consent-btn').addEventListener('click', async () => {
        const checked = [...document.querySelectorAll('input[type=checkbox]:checked')].map(el => el.id);
        if (checked.length === 0) {
            alert('최소 1개 이상 동의해주세요.');
            return;
        }
        localStorage.setItem('ls_consents', JSON.stringify(checked));
        await fetch('/api/consent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ consents: checked }),
        });
        window.location.href = '/';
    });
</script>
</body>
</html>
