<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ item.name }} 신청 – LifeSync360</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .apply-page { max-width: 560px; margin: 0 auto; padding: 16px 16px 120px; }
        .apply-summary { padding: 16px; background: #eff6ff; border: 1px solid #bfdbfe;
                         border-radius: 12px; margin-bottom: 18px; }
        .apply-summary .chip { display: inline-block; padding: 3px 10px; background: #3b82f6; color: #fff;
                               border-radius: 999px; font-size: 12px; font-weight: 600; }
        .apply-summary .name { font-size: 18px; font-weight: 700; color: #0f172a; margin-top: 8px; }
        .apply-summary .desc { color: #475569; font-size: 13px; margin-top: 4px; line-height: 1.5; }
        .apply-section { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
                         padding: 16px; margin-bottom: 14px; }
        .apply-section h3 { font-size: 14px; color: #1e40af; margin: 0 0 12px; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; font-weight: 500; }
        .form-row label .req { color: #ef4444; margin-left: 2px; }
        .form-row input, .form-row select, .form-row textarea {
            width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #cbd5e1;
            border-radius: 8px; box-sizing: border-box; background: #fff;
        }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
            outline: 0; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15);
        }
        .form-row textarea { resize: vertical; min-height: 70px; }
        .form-row .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .agree-row { display: flex; align-items: flex-start; gap: 8px; padding: 12px 14px;
                     background: #f8fafc; border-radius: 8px; }
        .agree-row input { margin-top: 2px; accent-color: #3b82f6; }
        .agree-row label { font-size: 13px; color: #475569; line-height: 1.5; cursor: pointer; }
        .apply-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px 20px;
                     background: linear-gradient(to top, #fff 80%, rgba(255,255,255,0)); }
        .apply-cta button { width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
                            background: #3b82f6; color: #fff; border: 0; border-radius: 12px; cursor: pointer; }
        .apply-cta button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .apply-result { padding: 32px 24px; text-align: center; background: #f0fdf4;
                         border: 1px solid #86efac; border-radius: 14px; margin-top: 40px; display: none; }
        .apply-result .icon { font-size: 48px; margin-bottom: 12px; }
        .apply-result .title { font-size: 18px; font-weight: 700; color: #166534; }
        .apply-result .desc { color: #15803d; font-size: 13px; margin-top: 8px; line-height: 1.6; }
        .apply-result .app-id { display: inline-block; padding: 4px 10px; background: #fff;
                                 border-radius: 6px; font-family: monospace; font-size: 12px; margin-top: 12px; }
        .apply-result a { display: inline-block; margin-top: 16px; padding: 10px 20px;
                          background: #3b82f6; color: #fff; border-radius: 8px;
                          text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header-inner">
            <button class="back-btn" onclick="history.back()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <span class="header-title">상품 신청</span>
            <span></span>
        </div>
    </header>

    <main class="apply-page" id="apply-form-wrap">
        <div class="apply-summary">
            <span class="chip">{{ item.category }}</span>
            <div class="name">{{ item.name }}</div>
            <div class="desc">{{ item.desc }}</div>
        </div>

        <form id="apply-form">
            <div class="apply-section">
                <h3>신청자 정보</h3>
                <div class="form-row">
                    <label>이름<span class="req">*</span></label>
                    <input type="text" id="applicant_name" required maxlength="20" placeholder="홍길동">
                </div>
                <div class="form-row">
                    <label>휴대전화<span class="req">*</span></label>
                    <input type="tel" id="applicant_phone" required pattern="01[0-9]-?[0-9]{3,4}-?[0-9]{4}" placeholder="010-1234-5678">
                </div>
                <div class="form-row">
                    <label>이메일</label>
                    <input type="email" id="applicant_email" placeholder="example@lifesync.com">
                </div>
            </div>

            <div class="apply-section">
                <h3>신청 상세</h3>
                <div class="form-row">
                    <label>신청 금액 / 한도</label>
                    <input type="text" id="apply_amount" placeholder="예: 100만원 / 보장 한도 5천만원">
                    <div class="hint">상품 특성에 따라 정확한 금액은 담당자와 상담 후 확정됩니다.</div>
                </div>
                <div class="form-row">
                    <label>희망 상담 시간</label>
                    <select id="contact_time">
                        <option value="any">아무때나</option>
                        <option value="morning">오전 (9~12시)</option>
                        <option value="afternoon">오후 (13~17시)</option>
                        <option value="evening">저녁 (18~20시)</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>문의 / 메모</label>
                    <textarea id="memo" maxlength="300" placeholder="추가로 문의하실 내용이 있다면 작성해 주세요."></textarea>
                </div>
            </div>

            <div class="apply-section">
                <h3>약관 동의</h3>
                <div class="agree-row" style="margin-bottom:10px;">
                    <input type="checkbox" id="agree_terms" required>
                    <label for="agree_terms"><strong>(필수)</strong> 신청 정보 수집·이용 및 본 상품 약관에 동의합니다.</label>
                </div>
                <div class="agree-row">
                    <input type="checkbox" id="agree_marketing">
                    <label for="agree_marketing">(선택) 마케팅 정보 수신 및 혜택 안내에 동의합니다.</label>
                </div>
            </div>
        </form>
    </main>

    <main class="apply-page" id="apply-result-wrap" style="display:none;">
        <div class="apply-result" id="apply-result-card" style="display:block;">
            <div class="icon">✅</div>
            <div class="title">신청이 접수되었습니다</div>
            <div class="desc">담당자가 영업일 기준 1~2일 내 연락드릴 예정이에요.</div>
            <div class="app-id" id="app-id"></div>
            <a href="/">홈으로 돌아가기</a>
        </div>
    </main>

    <div class="apply-cta" id="apply-cta-bar">
        <button id="apply-submit-btn" type="button" disabled>신청 제출</button>
    </div>
</div>

<script>
    const PRODUCT_ID   = {{ item.product_id | default('null') }};
    const PRODUCT_CODE = '{{ item.id }}';
    const form         = document.getElementById('apply-form');
    const submitBtn    = document.getElementById('apply-submit-btn');
    const ctaBar       = document.getElementById('apply-cta-bar');
    const formWrap     = document.getElementById('apply-form-wrap');
    const resultWrap   = document.getElementById('apply-result-wrap');

    function emitEvent(type, target) {
        const token = localStorage.getItem('ls_token');
        if (!token) return;
        const body = { event_type: type, event_target: target };
        if (PRODUCT_ID) body.product_id = PRODUCT_ID;
        fetch('/api/event', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        }).catch(() => {});
    }
    emitEvent('apply_view', '{{ item.name | e }}');

    function validate() {
        const name  = document.getElementById('applicant_name').value.trim();
        const phone = document.getElementById('applicant_phone').value.trim();
        const agree = document.getElementById('agree_terms').checked;
        submitBtn.disabled = !(name && /^01[0-9]-?[0-9]{3,4}-?[0-9]{4}$/.test(phone) && agree);
    }
    form.addEventListener('input',  validate);
    form.addEventListener('change', validate);

    submitBtn.addEventListener('click', async () => {
        const token = localStorage.getItem('ls_token');
        if (!token) { window.location.href = '/login'; return; }
        const payload = {
            product_code:    PRODUCT_CODE,
            product_id:      PRODUCT_ID,
            applicant_name:  document.getElementById('applicant_name').value.trim(),
            applicant_phone: document.getElementById('applicant_phone').value.trim(),
            applicant_email: document.getElementById('applicant_email').value.trim(),
            apply_amount:    document.getElementById('apply_amount').value.trim(),
            contact_time:    document.getElementById('contact_time').value,
            memo:            document.getElementById('memo').value.trim(),
            agree_marketing: document.getElementById('agree_marketing').checked,
        };
        submitBtn.disabled = true;
        submitBtn.textContent = '제출 중...';
        try {
            const resp = await fetch(`/api/product/${PRODUCT_CODE}/apply`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || '신청 실패');
            emitEvent('apply_submitted', '{{ item.name | e }}');
            document.getElementById('app-id').textContent = '신청번호: ' + (data.application_id || '-');
            formWrap.style.display   = 'none';
            ctaBar.style.display     = 'none';
            resultWrap.style.display = 'block';
        } catch (e) {
            submitBtn.disabled    = false;
            submitBtn.textContent = '신청 제출';
            alert('신청에 실패했어요: ' + e.message);
        }
    });
</script>
</body>
</html>
