---
- name: Create tokenization directory
  file:
    path: /opt/tokenization
    state: directory
    mode: '0755'
    owner: ansible

- name: Deploy token service
  copy:
    src: token_service.py
    dest: /opt/tokenization/token_service.py
    mode: '0644'
  notify: Restart tokenization

- name: Deploy masking rules
  copy:
    src: masking_rules.yml
    dest: /opt/tokenization/masking_rules.yml
    mode: '0644'

- name: Install python3-venv
  apt:
    name: python3-venv
    state: present

- name: Create virtualenv
  command: python3 -m venv /opt/tokenization/venv
  args:
    creates: /opt/tokenization/venv

- name: Install Python dependencies
  pip:
    name:
      - fastapi
      - uvicorn
      - boto3
      - pymysql
      - pydantic
      - cryptography
      - DBUtils
    virtualenv: /opt/tokenization/venv

- name: Deploy PII AES key env (pii-masked 엔드포인트 복호화용)
  copy:
    content: "TOKEN_AES_KEY_B64={{ token_aes_key_b64 }}\n"
    dest: /opt/tokenization/.pii_key.env
    owner: ansible
    mode: '0640'
  no_log: true
  notify: Restart tokenization

- name: Deploy systemd service file
  template:
    src: tokenization.service.j2
    dest: /etc/systemd/system/tokenization.service
    mode: '0644'
  notify: Restart tokenization

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Ensure tokenization service is running
  systemd:
    name: tokenization
    state: started
    enabled: yes
