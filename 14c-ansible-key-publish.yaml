AWSTemplateFormatVersion: "2010-09-09"
Description: 14c Ansible 공개키 SSM 등록·SendCommand·VPN 푸시 (14b 인스턴스에 SSM Run Command). 14b 부팅·키 생성 후 Association 이 스크립트 실행.
Parameters:
  ProjectName:
    Type: String
    Default: lifesync
  Environment:
    Type: String
    Default: dev
  AnsibleControlInstanceId:
    Type: String
    Description: 14b-ansible-ec2 출력 AnsibleControlInstanceId (i-...).
  SsmAppendAnsiblePublicKey:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
  SsmPublicKeyTargetInstanceIds:
    Type: String
    Default: ""
  SsmAppendKeyTargetUser:
    Type: String
    Default: ansible
  VpnPushOnpremHost:
    Type: String
    Default: ""
  VpnPushOnpremSshPort:
    Type: String
    Default: "22"
  VpnPushSshLoginUser:
    Type: String
    Default: ansible
  VpnPushAuthorizedKeysUser:
    Type: String
    Default: ansible
  VpnPushBootDelaySec:
    Type: String
    Default: "120"

Resources:
  AnsibleKeyPublishDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      DocumentFormat: YAML
      Name: !Sub ${ProjectName}-${Environment}-ansible-key-publish
      Content:
        schemaVersion: "2.2"
        description: !Sub ${ProjectName}-${Environment} ansible public key publish
        mainSteps:
          - action: aws:runShellScript
            name: PublishAnsibleKeys
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -euxo pipefail
                  log() {
                    local t
                    t=$$(date -u +%Y-%m-%dT%H:%M:%SZ)
                    echo "[key-publish $$t]" "$$@"
                  }
                  err() {
                    local t
                    t=$$(date -u +%Y-%m-%dT%H:%M:%SZ)
                    echo "[key-publish ERROR $$t]" "$$@" >&2
                  }
                  for _w in $$(seq 1 90); do
                    [[ -f /home/ansible/.ssh/id_rsa.pub ]] && break
                    err "waiting id_rsa.pub ($$_w/90)..."
                    sleep 10
                  done
                  [[ -f /home/ansible/.ssh/id_rsa.pub ]] || { err "id_rsa.pub 없음"; exit 1; }

                  TOKEN=""
                  for _i in 1 2 3 4 5 6; do
                    TOKEN=$$(curl -fsS --connect-timeout 5 --max-time 20 -X PUT "http://169.254.169.254/latest/api/token" \
                      -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null) || TOKEN=""
                    if [[ -n "$$TOKEN" ]]; then break; fi
                    err "IMDSv2 token attempt $$_i failed; sleep 5s"
                    sleep 5
                  done
                  [[ -n "$$TOKEN" ]] || { err "IMDSv2 token 없음"; exit 1; }

                  META_REGION=""
                  for _i in 1 2 3 4 5 6; do
                    META_REGION=$$(curl -fsS --connect-timeout 5 --max-time 20 -H "X-aws-ec2-metadata-token: $$TOKEN" \
                      http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null) || META_REGION=""
                    if [[ -n "$$META_REGION" ]]; then break; fi
                    err "IMDS region attempt $$_i failed; sleep 5s"
                    sleep 5
                  done
                  [[ -n "$$META_REGION" ]] || { err "placement/region 없음"; exit 1; }

                  PUBKEY=$$(cat /home/ansible/.ssh/id_rsa.pub)
                  [[ -n "$$PUBKEY" ]] || { err "공개키 파일 비어 있음"; exit 1; }

                  _put_ok=0
                  for _p in 1 2 3 4 5; do
                    if aws ssm put-parameter \
                      --region "$$META_REGION" \
                      --name "/${ProjectName}/${Environment}/ansible/public-key" \
                      --type String \
                      --value "$$PUBKEY" \
                      --overwrite; then
                      _put_ok=1
                      break
                    fi
                    err "ssm put-parameter attempt $$_p failed; sleep 8s"
                    sleep 8
                  done
                  if [[ $$_put_ok -ne 1 ]]; then
                    err "ssm put-parameter 재시도 소진"
                    exit 1
                  fi
                  log "SSM public-key 반영 완료"

                  if [ "${SsmAppendAnsiblePublicKey}" = "true" ] && [ -n "${SsmPublicKeyTargetInstanceIds}" ]; then
                    B64KEY=$$(base64 -w0 < /home/ansible/.ssh/id_rsa.pub 2>/dev/null || base64 < /home/ansible/.ssh/id_rsa.pub | tr -d '\n')
                    _old_ifs=$$IFS
                    IFS=','
                    for _id in ${SsmPublicKeyTargetInstanceIds}; do
                      _id=$$(echo "$$_id" | tr -d '[:space:]')
                      [ -z "$$_id" ] && continue
                      log "SSM SendCommand append pubkey -> $$_id"
                      if ! jq -n \
                        --arg b64 "$$B64KEY" \
                        --arg u "${SsmAppendKeyTargetUser}" \
                        --arg iid "$$_id" \
                        --arg doc "AWS-RunShellScript" \
                        '{DocumentName:$doc,InstanceIds:[$iid],Parameters:{commands:[("set -euo pipefail; mkdir -p /home/" + $u + "/.ssh; chmod 700 /home/" + $u + "/.ssh; printf %s " + ($b64|@sh) + " | base64 -d >> /home/" + $u + "/.ssh/authorized_keys; echo >> /home/" + $u + "/.ssh/authorized_keys; chmod 600 /home/" + $u + "/.ssh/authorized_keys; chown -R " + $u + ":" + $u + " /home/" + $u + "/.ssh")]},Comment:"ansible-control append pubkey"}' >/tmp/ssm-append.json; then
                        err "jq ssm payload 빌드 실패 $$_id — 스킵"
                        continue
                      fi
                      _cid=$$(aws ssm send-command --region "$$META_REGION" --cli-input-json file:///tmp/ssm-append.json --query Command.CommandId --output text 2>/dev/null) || true
                      rm -f /tmp/ssm-append.json
                      if [[ -z "$$_cid" || "$$_cid" == "None" ]]; then
                        err "send-command 실패 $$_id"
                        continue
                      fi
                      aws ssm wait command-executed --region "$$META_REGION" --command-id "$$_cid" --instance-id "$$_id" || err "[WARN] command-executed 대기 실패 $$_id"
                    done
                    IFS=$$_old_ifs
                  fi

                  if [ -n "${VpnPushOnpremHost}" ]; then
                    install -d /opt/lifesync/bin /etc/lifesync
                    umask 077
                    {
                      echo "VPN_PUSH_HOST=${VpnPushOnpremHost}"
                      echo "VPN_PUSH_PORT=${VpnPushOnpremSshPort}"
                      echo "VPN_PUSH_SSH_USER=${VpnPushSshLoginUser}"
                      echo "VPN_PUSH_KEYS_USER=${VpnPushAuthorizedKeysUser}"
                      echo "VPN_PUSH_BOOTSTRAP_PARAM=/${ProjectName}/${Environment}/ansible/vpn-bootstrap-private-key"
                      echo "VPN_PUSH_DELAY_SEC=${VpnPushBootDelaySec}"
                    } >/etc/lifesync/onprem-vpn-push.env
                    chmod 600 /etc/lifesync/onprem-vpn-push.env
                    printf '%s\n' \
                      '#!/bin/bash' \
                      'set -euo pipefail' \
                      '[[ -f /etc/lifesync/onprem-vpn-push.env ]] || exit 0' \
                      'set -a' \
                      '# shellcheck disable=SC1091' \
                      '. /etc/lifesync/onprem-vpn-push.env' \
                      'set +a' \
                      '[[ -n "$$VPN_PUSH_HOST" ]] || exit 0' \
                      'sleep "$$VPN_PUSH_DELAY_SEC"' \
                      'PUB=/home/ansible/.ssh/id_rsa.pub' \
                      '[[ -f "$$PUB" ]] || { echo "[vpn-push] missing $$PUB" >&2; exit 1; }' \
                      'T=""' \
                      'for _v in 1 2 3 4 5; do' \
                      '  T=$$(curl -fsS --connect-timeout 5 --max-time 20 -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null) && [[ -n "$$T" ]] && break' \
                      '  echo "[vpn-push] IMDS token retry $$_v" >&2' \
                      '  sleep 5' \
                      'done' \
                      '[[ -n "$$T" ]] || { echo "[vpn-push] IMDS token 실패" >&2; exit 1; }' \
                      'R=""' \
                      'for _v in 1 2 3 4 5; do' \
                      '  R=$$(curl -fsS --connect-timeout 5 --max-time 20 -H "X-aws-ec2-metadata-token: $$T" http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null) && [[ -n "$$R" ]] && break' \
                      '  sleep 5' \
                      'done' \
                      '[[ -n "$$R" ]] || { echo "[vpn-push] region 실패" >&2; exit 1; }' \
                      'KEYTMP=$$(mktemp)' \
                      'trap '"'"'rm -f "$$KEYTMP"'"'"' EXIT' \
                      '_ssm_ok=0' \
                      'for _v in 1 2 3 4 5; do' \
                      '  if aws ssm get-parameter --region "$$R" --name "$$VPN_PUSH_BOOTSTRAP_PARAM" --with-decryption --query Parameter.Value --output text >"$$KEYTMP" 2>/dev/null; then' \
                      '    _ssm_ok=1' \
                      '    break' \
                      '  fi' \
                      '  echo "[vpn-push] SSM get-parameter retry $$_v" >&2' \
                      '  sleep 6' \
                      'done' \
                      'if [[ $$_ssm_ok -ne 1 ]]; then' \
                      '  echo "[vpn-push] SSM PEM 없음: $$VPN_PUSH_BOOTSTRAP_PARAM" >&2' \
                      '  exit 1' \
                      'fi' \
                      'chmod 600 "$$KEYTMP"' \
                      'exec ssh -i "$$KEYTMP" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -p "$$VPN_PUSH_PORT" "$$VPN_PUSH_SSH_USER@$$VPN_PUSH_HOST" "set -euo pipefail; install -d -m 700 /home/${VpnPushAuthorizedKeysUser}/.ssh; touch /home/${VpnPushAuthorizedKeysUser}/.ssh/authorized_keys; chmod 700 /home/${VpnPushAuthorizedKeysUser}/.ssh; chmod 600 /home/${VpnPushAuthorizedKeysUser}/.ssh/authorized_keys; chown -R ${VpnPushAuthorizedKeysUser}:${VpnPushAuthorizedKeysUser} /home/${VpnPushAuthorizedKeysUser}/.ssh; cat >> /home/${VpnPushAuthorizedKeysUser}/.ssh/authorized_keys" < "$$PUB"' \
                      >/opt/lifesync/bin/run-onprem-vpn-key-push.sh
                    chmod 755 /opt/lifesync/bin/run-onprem-vpn-key-push.sh
                    /opt/lifesync/bin/run-onprem-vpn-key-push.sh || err "[WARN] VPN SSH pubkey push 실패"
                  fi
                  log "14c key-publish 스크립트 정상 종료"
  AnsibleKeyPublishAssociation:
    Type: AWS::SSM::Association
    DependsOn: AnsibleKeyPublishDocument
    Properties:
      AssociationName: !Sub ${ProjectName}-${Environment}-ansible-key-publish-assoc
      Name: !Ref AnsibleKeyPublishDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref AnsibleControlInstanceId

Outputs:
  AnsibleKeyPublishDocumentName:
    Value: !Ref AnsibleKeyPublishDocument
  AnsibleKeyPublishAssociationId:
    Value: !Ref AnsibleKeyPublishAssociation
