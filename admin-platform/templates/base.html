<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LifeSync360 Admin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="admin-wrap">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-main">LifeSync360</div>
            <div class="logo-sub">Admin Console</div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item {% if active == 'overview' %}active{% endif %}" href="{{ url_for('overview') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
                개요
            </a>
            <a class="nav-item {% if active == 'users' %}active{% endif %}" href="{{ url_for('users') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                유저 관리
            </a>
        </nav>
        <div class="sidebar-footer">USE_MOCK: {{ 'ON' if config.USE_MOCK else 'OFF' }}</div>
    </aside>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">{% block page_title %}{% endblock %}</span>
            <div class="topbar-right">
                <span class="admin-badge">{{ config.ADMIN_USER }}</span>
                <form action="{{ url_for('logout') }}" method="get" style="display:inline">
                    <button class="logout-btn" type="submit">로그아웃</button>
                </form>
            </div>
        </div>
        <div class="page-body">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
</body>
</html>
