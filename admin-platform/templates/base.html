<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LifeSync360 Admin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<header class="top-header">
    <div class="header-inner">
        <div class="brand">
            <span class="brand-main">LifeSync 360</span>
            <span class="brand-sub">Admin Dashboard</span>
        </div>
        <nav class="top-tabs">
            <a class="tab {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">전체 현황</a>
            <a class="tab {% if active == 'customer' %}active{% endif %}"  href="{{ url_for('users') }}">Customer 360</a>
            <a class="tab {% if active == 'ai' %}active{% endif %}"        href="{{ url_for('ai') }}">AI 추천</a>
            <a class="tab {% if active == 'ops' %}active{% endif %}"       href="{{ url_for('ops') }}">Network</a>
        </nav>
        <div class="header-right">
            <span class="user-status"><span class="status-dot"></span> {{ config.ADMIN_USER }}@lifesync</span>
            <form action="{{ url_for('logout') }}" method="get" style="display:inline">
                <button class="logout-btn" type="submit">로그아웃</button>
            </form>
        </div>
    </div>
</header>
<main class="page-body">
    {% block content %}{% endblock %}
</main>
</body>
</html>
