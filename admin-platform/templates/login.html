<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 – LifeSync360 Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-title">LifeSync360</div>
        <div class="login-sub">Admin Console</div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label class="form-label">아이디</label>
                <input class="input-full" type="text" name="username" autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input class="input-full" type="password" name="password" autocomplete="current-password">
            </div>
            <button class="btn btn-primary btn-full" type="submit">로그인</button>
        </form>
    </div>
</div>
</body>
</html>
