AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 ECS Cluster (Fargate)

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: lifesync-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

Outputs:
  ClusterName:
    Value: !Ref Cluster
    Export:
      Name: lifesync-ecs-ClusterName
  ClusterArn:
    Value: !GetAtt Cluster.Arn
    Export:
      Name: lifesync-ecs-ClusterArn
