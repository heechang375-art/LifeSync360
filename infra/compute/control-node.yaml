AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 Ansible Control Node

Parameters:
  InstanceType:
    Type: String
    Default: t3.small
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Control Node를 배치할 서브넷
  VpcId:
    Type: AWS::EC2::VPC::Id
  OnPremCidr:
    Type: String
    Default: 192.168.56.0/24
    Description: 온프레미스 VPN 대역 (포트 9000 인바운드 허용)
  CodeCommitRepoUrl:
    Type: String
    Default: https://git-codecommit.ap-northeast-2.amazonaws.com/v1/repos/onprem-prod-repo

Resources:

  # ── IAM Role ────────────────────────────────────────
  ControlNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lifesync-control-node-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ControlNodePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Sub arn:aws:secretsmanager:ap-northeast-2:${AWS::AccountId}:secret:lifesync/ansible-vault*
                  - !Sub arn:aws:secretsmanager:ap-northeast-2:${AWS::AccountId}:secret:lifesync/ansible-vm*
                  - !Sub arn:aws:secretsmanager:ap-northeast-2:${AWS::AccountId}:secret:lifesync/deploy-token*
              - Effect: Allow
                Action: codecommit:GitPull
                Resource:
                  - !Sub arn:aws:codecommit:ap-northeast-2:${AWS::AccountId}:onprem-prod-repo

  ControlNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref ControlNodeRole]

  # ── Security Group ───────────────────────────────────
  ControlNodeSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Ansible Control Node SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9000
          ToPort: 9000
          CidrIp: !Ref OnPremCidr
          Description: Deploy Server (on-prem 트리거)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.0.0.0/16
          Description: SSH (VPC 내부)
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  # ── EC2 Instance ─────────────────────────────────────
  ControlNodeInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref ControlNodeInstanceProfile
      SecurityGroupIds: [!Ref ControlNodeSg]
      Tags:
        - Key: Name
          Value: lifesync-control-node
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/control-node-init.log 2>&1

          echo "=== [1/6] 패키지 설치 ==="
          apt-get update -q
          apt-get install -y ansible git python3-pip python3-venv sshpass

          echo "=== [2/6] CodeCommit 클론 ==="
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true
          mkdir -p /opt/ansible
          git clone ${CodeCommitRepoUrl} /opt/ansible/onprem-prod-repo
          chown -R ubuntu:ubuntu /opt/ansible

          echo "=== [3/6] Vault 패스워드 설정 ==="
          VAULT_PASS=$(aws secretsmanager get-secret-value \
            --secret-id lifesync/ansible-vault \
            --region ap-northeast-2 \
            --query SecretString --output text \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
          echo "$VAULT_PASS" > /home/ubuntu/.vault_pass
          chmod 600 /home/ubuntu/.vault_pass
          chown ubuntu:ubuntu /home/ubuntu/.vault_pass

          echo "=== [4/6] Deploy Server 설치 ==="
          mkdir -p /opt/deploy-server /etc/deploy-server
          chown ubuntu:ubuntu /opt/deploy-server

          DEPLOY_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id lifesync/deploy-token \
            --region ap-northeast-2 \
            --query SecretString --output text \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "DEPLOY_TOKEN=${!DEPLOY_TOKEN}" > /etc/deploy-server/env
          chmod 600 /etc/deploy-server/env

          cat > /opt/deploy-server/deploy_server.py << 'PYEOF'
          import os, subprocess, logging
          from flask import Flask, request, jsonify
          app = Flask(__name__)
          logging.basicConfig(format='%(asctime)s %(levelname)s %(message)s', level=logging.INFO)
          DEPLOY_TOKEN = os.environ['DEPLOY_TOKEN']
          ANSIBLE_DIR  = os.environ.get('ANSIBLE_DIR',     '/opt/ansible/onprem-prod-repo/ansible')
          VAULT_PASS   = os.environ.get('VAULT_PASS_FILE', '/home/ubuntu/.vault_pass')
          DEPLOY_LOG   = os.environ.get('DEPLOY_LOG',      '/var/log/ansible-deploy.log')
          @app.route('/health')
          def health():
              return jsonify({'status': 'ok'})
          @app.route('/deploy', methods=['POST'])
          def deploy():
              if request.headers.get('X-Deploy-Token', '') != DEPLOY_TOKEN:
                  logging.warning('배포 요청 거부 — 토큰 불일치')
                  return jsonify({'error': '토큰 불일치'}), 401
              log_fd = open(DEPLOY_LOG, 'a')
              subprocess.Popen(
                  ['ansible-playbook', 'site.yml', '-i', 'inventory/hosts.yml',
                   f'--vault-password-file={VAULT_PASS}'],
                  cwd=ANSIBLE_DIR, stdout=log_fd, stderr=log_fd)
              logging.info('ansible-playbook 트리거됨')
              return jsonify({'status': 'triggered'})
          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=9000)
          PYEOF

          cat > /etc/systemd/system/deploy-server.service << 'SVCEOF'
          [Unit]
          Description=LifeSync360 Deploy Server
          After=network.target
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/opt/deploy-server
          ExecStart=/opt/deploy-server/venv/bin/python deploy_server.py
          Restart=always
          RestartSec=5
          EnvironmentFile=/etc/deploy-server/env
          Environment=ANSIBLE_DIR=/opt/ansible/onprem-prod-repo/ansible
          Environment=VAULT_PASS_FILE=/home/ubuntu/.vault_pass
          Environment=DEPLOY_LOG=/var/log/ansible-deploy.log
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          sudo -u ubuntu python3 -m venv /opt/deploy-server/venv
          sudo -u ubuntu /opt/deploy-server/venv/bin/pip install flask -q
          systemctl daemon-reload
          systemctl enable deploy-server
          systemctl start deploy-server

          echo "=== [5/6] SSH 키 생성 및 배포 ==="
          ANSIBLE_PASS=$(aws secretsmanager get-secret-value \
            --secret-id lifesync/ansible-vm \
            --region ap-northeast-2 \
            --query SecretString --output text \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

          sudo -u ubuntu bash << SSHEOF
          set -e
          KEY_PATH=~/.ssh/lifesync360-onprem.pem
          if [ ! -f "\$KEY_PATH" ]; then
            ssh-keygen -t rsa -b 4096 -f "\$KEY_PATH" -N ""
          fi
          for HOST in 192.168.56.13; do
            sshpass -p "${!ANSIBLE_PASS}" ssh-copy-id \
              -i "\${KEY_PATH}.pub" -o StrictHostKeyChecking=no ansible@\$HOST
          done
          for HOST in 192.168.56.11 192.168.56.12; do
            sshpass -p "${!ANSIBLE_PASS}" ssh-copy-id \
              -i "\${KEY_PATH}.pub" \
              -o StrictHostKeyChecking=no \
              -o "ProxyJump=ansible@192.168.56.13" \
              ansible@\$HOST
          done
          SSHEOF

          echo "=== [6/6] 초기화 완료 ==="
          echo "done" > /tmp/control-node-ready

Outputs:
  InstanceId:
    Value: !Ref ControlNodeInstance
  PrivateIp:
    Value: !GetAtt ControlNodeInstance.PrivateIp
    Description: vars.yml control_node_url에 사용할 IP
  DeployServerUrl:
    Value: !Sub http://${ControlNodeInstance.PrivateIp}:9000
