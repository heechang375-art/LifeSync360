AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 ECS platform 서비스 (TaskDef + Service)


Resources:
  TaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lifesync-platform
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !ImportValue lifesync-iam-EcsTaskExecutionRoleArn
      TaskRoleArn: !ImportValue lifesync-iam-EcsPlatformTaskRoleArn
      ContainerDefinitions:
        - Name: platform
          Image: public.ecr.aws/docker/library/python:3.11-slim
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: USE_MOCK
              Value: 'false'
            - Name: AWS_REGION
              Value: ap-northeast-2
            - Name: DYNAMO_TABLE
              Value: !ImportValue lifesync-dynamo-ScoresTableName
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub
                - '${Arn}:secret::'
                - Arn: !ImportValue lifesync-secrets-JwtSecretArn
            - Name: AURORA_HOST
              ValueFrom: !Sub
                - '${Arn}:host::'
                - Arn: !ImportValue lifesync-secrets-AuroraSecretArn
            - Name: DB_USER
              ValueFrom: !Sub
                - '${Arn}:user::'
                - Arn: !ImportValue lifesync-secrets-AuroraSecretArn
            - Name: DB_PASS
              ValueFrom: !Sub
                - '${Arn}:password::'
                - Arn: !ImportValue lifesync-secrets-AuroraSecretArn
            - Name: REDIS_HOST
              ValueFrom: !Sub
                - '${Arn}:host::'
                - Arn: !ImportValue lifesync-secrets-RedisSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/lifesync-platform
              awslogs-region: ap-northeast-2
              awslogs-stream-prefix: ecs

  Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: lifesync-platform-service
      Cluster: !ImportValue lifesync-ecs-ClusterName
      TaskDefinition: !Ref TaskDef
      DesiredCount: 0
      LaunchType: FARGATE
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !ImportValue lifesync-subnets-AppSubnet1Id
            - !ImportValue lifesync-subnets-AppSubnet2Id
          SecurityGroups:
            - !ImportValue lifesync-sg-EcsPlatformSgId
      LoadBalancers:
        - ContainerName: platform
          ContainerPort: 8000
          TargetGroupArn: !ImportValue lifesync-alb-PlatformTgArn
