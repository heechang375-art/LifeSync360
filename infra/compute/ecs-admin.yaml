AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 ECS admin-platform 서비스 (TaskDef + Service)


Resources:
  TaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: lifesync-admin
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !ImportValue lifesync-iam-EcsTaskExecutionRoleArn
      TaskRoleArn: !ImportValue lifesync-iam-EcsAdminTaskRoleArn
      ContainerDefinitions:
        - Name: admin
          Image: public.ecr.aws/docker/library/python:3.11-slim
          PortMappings:
            - ContainerPort: 5001
          Environment:
            - Name: USE_MOCK
              Value: 'false'
            - Name: AWS_REGION
              Value: ap-northeast-2
            - Name: DYNAMO_TABLE
              Value: !ImportValue lifesync-dynamo-ScoresTableName
          Secrets:
            - Name: SECRET_KEY
              ValueFrom: !Sub
                - '${Arn}:secret_key::'
                - Arn: !ImportValue lifesync-secrets-AdminSecretArn
            - Name: ADMIN_USER
              ValueFrom: !Sub
                - '${Arn}:user::'
                - Arn: !ImportValue lifesync-secrets-AdminSecretArn
            - Name: ADMIN_PASSWORD
              ValueFrom: !Sub
                - '${Arn}:password::'
                - Arn: !ImportValue lifesync-secrets-AdminSecretArn
            - Name: AURORA_HOST
              ValueFrom: !Sub
                - '${Arn}:host::'
                - Arn: !ImportValue lifesync-secrets-AuroraSecretArn
            - Name: DB_USER
              ValueFrom: !Sub
                - '${Arn}:user::'
                - Arn: !ImportValue lifesync-secrets-AuroraSecretArn
            - Name: DB_PASS
              ValueFrom: !Sub
                - '${Arn}:password::'
                - Arn: !ImportValue lifesync-secrets-AuroraSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/lifesync-admin
              awslogs-region: ap-northeast-2
              awslogs-stream-prefix: ecs

  Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: lifesync-admin-service
      Cluster: !ImportValue lifesync-ecs-ClusterName
      TaskDefinition: !Ref TaskDef
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !ImportValue lifesync-subnets-AppSubnet1Id
            - !ImportValue lifesync-subnets-AppSubnet2Id
          SecurityGroups:
            - !ImportValue lifesync-sg-EcsAdminSgId
      LoadBalancers:
        - ContainerName: admin
          ContainerPort: 5001
          TargetGroupArn: !ImportValue lifesync-alb-AdminTgArn
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
