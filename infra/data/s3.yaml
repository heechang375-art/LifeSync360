AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 S3 Buckets

Resources:
  PipelineBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lifesync-pipeline-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lifesync-lambda-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  PipelineBucketName:
    Value: !Ref PipelineBucket
    Export:
      Name: lifesync-s3-PipelineBucketName
  LambdaArtifactBucketName:
    Value: !Ref LambdaArtifactBucket
    Export:
      Name: lifesync-s3-LambdaArtifactBucketName
