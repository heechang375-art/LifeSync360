AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 Secrets Manager — 플레이스홀더 생성 (배포 후 실제값으로 교체)

Resources:
  AuroraSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lifesync/aurora
      Description: Aurora MySQL 접속 정보
      SecretString: '{"host":"REPLACE_ME","user":"REPLACE_ME","password":"REPLACE_ME","dbname":"lifesync"}'

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lifesync/jwt
      Description: platform JWT 서명 키 (32자 이상)
      SecretString: '{"secret":"REPLACE_ME_32CHARS_MIN"}'

  RedisSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lifesync/redis
      Description: ElastiCache Redis 엔드포인트
      SecretString: '{"host":"REPLACE_ME"}'

  AdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lifesync/admin
      Description: admin-platform 로그인 + Flask 세션 키
      SecretString: '{"user":"REPLACE_ME","password":"REPLACE_ME","secret_key":"REPLACE_ME_32CHARS_MIN"}'

Outputs:
  AuroraSecretArn:
    Value: !Ref AuroraSecret
    Export:
      Name: lifesync-secrets-AuroraSecretArn
  JwtSecretArn:
    Value: !Ref JwtSecret
    Export:
      Name: lifesync-secrets-JwtSecretArn
  RedisSecretArn:
    Value: !Ref RedisSecret
    Export:
      Name: lifesync-secrets-RedisSecretArn
  AdminSecretArn:
    Value: !Ref AdminSecret
    Export:
      Name: lifesync-secrets-AdminSecretArn
