AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 DynamoDB — AI 분석 결과 테이블

Resources:
  ScoresTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: lifesync-scores
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: global_id
          AttributeType: S
      KeySchema:
        - AttributeName: global_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Name
          Value: lifesync-scores

Outputs:
  ScoresTableName:
    Value: !Ref ScoresTable
    Export:
      Name: lifesync-dynamo-ScoresTableName
  ScoresTableArn:
    Value: !GetAtt ScoresTable.Arn
    Export:
      Name: lifesync-dynamo-ScoresTableArn
