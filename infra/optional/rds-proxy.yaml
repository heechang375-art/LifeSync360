AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 RDS Proxy (Aurora 커넥션 풀링, 동시요청 증가 시 배포)

Resources:
  RdsProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: lifesync-aurora-proxy
      EngineFamily: MYSQL
      RoleArn: !ImportValue lifesync-iam-EcsTaskExecutionRoleArn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !ImportValue lifesync-secrets-AuroraSecretArn
          IAMAuth: DISABLED
      VpcSubnetIds:
        - !ImportValue lifesync-subnets-DataSubnetId
      VpcSecurityGroupIds:
        - !ImportValue lifesync-sg-AuroraSgId
      RequireTLS: true

  ProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RdsProxy
      TargetGroupName: default
      DBClusterIdentifiers:
        - !ImportValue lifesync-aurora-ClusterId

Outputs:
  ProxyEndpoint:
    Value: !GetAtt RdsProxy.Endpoint
    Export:
      Name: lifesync-rdsproxy-Endpoint
