AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 Site-to-Site VPN (온프레미스 연결 시 배포)

Parameters:
  OnPremPublicIp:
    Type: String
    Description: 온프레미스 라우터 공인 IP
  OnPremBgpAsn:
    Type: Number
    Default: 65000
  OnPremCidr:
    Type: String
    Description: 온프레미스 내부 CIDR (예 192.168.56.0/24)
    Default: 192.168.56.0/24

Resources:
  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Properties:
      BgpAsn: !Ref OnPremBgpAsn
      IpAddress: !Ref OnPremPublicIp
      Type: ipsec.1
      Tags:
        - Key: Name
          Value: lifesync-cgw-onprem

  VpnGateway:
    Type: AWS::EC2::VPNGateway
    Properties:
      Type: ipsec.1
      Tags:
        - Key: Name
          Value: lifesync-vgw

  VgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      VpnGatewayId: !Ref VpnGateway

  VpnConnection:
    Type: AWS::EC2::VPNConnection
    Properties:
      CustomerGatewayId: !Ref CustomerGateway
      VpnGatewayId: !Ref VpnGateway
      Type: ipsec.1
      StaticRoutesOnly: true

  OnPremRoute:
    Type: AWS::EC2::VPNConnectionRoute
    Properties:
      VpnConnectionId: !Ref VpnConnection
      DestinationCidrBlock: !Ref OnPremCidr

  AppRt1Propagation:
    Type: AWS::EC2::VPNGatewayRoutePropagation
    DependsOn: VgwAttachment
    Properties:
      RouteTableIds:
        - !ImportValue lifesync-rt-AppRt1Id
        - !ImportValue lifesync-rt-AppRt2Id
        - !ImportValue lifesync-rt-DataRtId
      VpnGatewayId: !Ref VpnGateway

Outputs:
  VpnConnectionId:
    Value: !Ref VpnConnection
    Export:
      Name: lifesync-vpn-ConnectionId
  VpnGatewayId:
    Value: !Ref VpnGateway
    Export:
      Name: lifesync-vpn-GatewayId
