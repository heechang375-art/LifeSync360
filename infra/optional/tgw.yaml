AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 Transit Gateway (멀티 VPC 또는 GCP 연결 확장 시 배포)

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      Description: lifesync transit gateway
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - Key: Name
          Value: lifesync-tgw

  TgwAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !ImportValue lifesync-vpc-VpcId
      SubnetIds:
        - !ImportValue lifesync-subnets-AppSubnet1Id
        - !ImportValue lifesync-subnets-AppSubnet2Id
      Tags:
        - Key: Name
          Value: lifesync-tgw-attach

Outputs:
  TgwId:
    Value: !Ref TransitGateway
    Export:
      Name: lifesync-tgw-Id
  TgwAttachmentId:
    Value: !Ref TgwAttachment
    Export:
      Name: lifesync-tgw-AttachmentId
