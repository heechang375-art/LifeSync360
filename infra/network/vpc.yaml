AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 VPC (ap-northeast-2, 10.0.0.0/16)

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: lifesync-vpc

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: lifesync-vpc-VpcId
  VpcCidr:
    Value: !GetAtt Vpc.CidrBlock
    Export:
      Name: lifesync-vpc-VpcCidr
