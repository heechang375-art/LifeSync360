AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 Route Tables

Resources:
  # ── Public RT (IGW) ───────────────────────────────────────
  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      Tags:
        - Key: Name
          Value: lifesync-rt-public

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !ImportValue lifesync-igw-IgwId

  PublicSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-PublicSubnet1Id
      RouteTableId: !Ref PublicRt

  PublicSubnet2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-PublicSubnet2Id
      RouteTableId: !Ref PublicRt

  # ── App Private RT 2a (NAT GW 1) ─────────────────────────
  AppRt1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      Tags:
        - Key: Name
          Value: lifesync-rt-app-2a

  AppRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref AppRt1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !ImportValue lifesync-nat-NatGw1Id

  AppSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-AppSubnet1Id
      RouteTableId: !Ref AppRt1

  # ── App Private RT 2c (NAT GW 2) ─────────────────────────
  AppRt2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      Tags:
        - Key: Name
          Value: lifesync-rt-app-2c

  AppRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref AppRt2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !ImportValue lifesync-nat-NatGw2Id

  AppSubnet2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-AppSubnet2Id
      RouteTableId: !Ref AppRt2

  # ── Data Private RT (NAT GW 1, 2a) ───────────────────────
  DataRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      Tags:
        - Key: Name
          Value: lifesync-rt-data

  DataRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref DataRt
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !ImportValue lifesync-nat-NatGw1Id

  DataSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-DataSubnetId
      RouteTableId: !Ref DataRt

  # ── 계열사 VM RT (공유, NAT GW 1) ────────────────────────
  VmRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      Tags:
        - Key: Name
          Value: lifesync-rt-vm

  VmRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VmRt
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !ImportValue lifesync-nat-NatGw1Id

  BankSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-BankSubnetId
      RouteTableId: !Ref VmRt

  CardSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-CardSubnetId
      RouteTableId: !Ref VmRt

  InsuranceSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-InsuranceSubnetId
      RouteTableId: !Ref VmRt

  InetInsSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-InetInsSubnetId
      RouteTableId: !Ref VmRt

  SecuritiesSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-SecuritiesSubnetId
      RouteTableId: !Ref VmRt

  HealthcareSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-HealthcareSubnetId
      RouteTableId: !Ref VmRt

  HospitalSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !ImportValue lifesync-subnets-HospitalSubnetId
      RouteTableId: !Ref VmRt

Outputs:
  PublicRtId:
    Value: !Ref PublicRt
    Export:
      Name: lifesync-rt-PublicRtId
  AppRt1Id:
    Value: !Ref AppRt1
    Export:
      Name: lifesync-rt-AppRt1Id
  AppRt2Id:
    Value: !Ref AppRt2
    Export:
      Name: lifesync-rt-AppRt2Id
  DataRtId:
    Value: !Ref DataRt
    Export:
      Name: lifesync-rt-DataRtId
  VmRtId:
    Value: !Ref VmRt
    Export:
      Name: lifesync-rt-VmRtId
