AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 Subnets — Public/App/Data/계열사VM

Resources:
  # ── Public (ALB, NAT GW) ──────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: ap-northeast-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: lifesync-public-2a

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: ap-northeast-2c
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: lifesync-public-2c

  # ── App Private (ECS platform / admin) ───────────────────
  AppSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-app-2a

  AppSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: ap-northeast-2c
      Tags:
        - Key: Name
          Value: lifesync-app-2c

  # ── Data Private (Aurora / Redis) ────────────────────────
  # Aurora DBSubnetGroup은 2 AZ 필요 → aurora.yaml에서 DataSubnet+AppSubnet2 조합 사용
  DataSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.20.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-data-2a

  # ── 계열사 VM Subnets (단일 AZ, 10씩 간격) ───────────────
  BankSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.100.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-bank

  CardSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.110.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-card

  InsuranceSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.120.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-insurance

  InetInsSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.130.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-inet-ins

  SecuritiesSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.140.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-securities

  HealthcareSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.150.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-healthcare

  HospitalSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue lifesync-vpc-VpcId
      CidrBlock: 10.0.160.0/24
      AvailabilityZone: ap-northeast-2a
      Tags:
        - Key: Name
          Value: lifesync-vm-hospital

Outputs:
  PublicSubnet1Id:
    Value: !Ref PublicSubnet1
    Export:
      Name: lifesync-subnets-PublicSubnet1Id
  PublicSubnet2Id:
    Value: !Ref PublicSubnet2
    Export:
      Name: lifesync-subnets-PublicSubnet2Id
  AppSubnet1Id:
    Value: !Ref AppSubnet1
    Export:
      Name: lifesync-subnets-AppSubnet1Id
  AppSubnet2Id:
    Value: !Ref AppSubnet2
    Export:
      Name: lifesync-subnets-AppSubnet2Id
  DataSubnetId:
    Value: !Ref DataSubnet
    Export:
      Name: lifesync-subnets-DataSubnetId
  BankSubnetId:
    Value: !Ref BankSubnet
    Export:
      Name: lifesync-subnets-BankSubnetId
  CardSubnetId:
    Value: !Ref CardSubnet
    Export:
      Name: lifesync-subnets-CardSubnetId
  InsuranceSubnetId:
    Value: !Ref InsuranceSubnet
    Export:
      Name: lifesync-subnets-InsuranceSubnetId
  InetInsSubnetId:
    Value: !Ref InetInsSubnet
    Export:
      Name: lifesync-subnets-InetInsSubnetId
  SecuritiesSubnetId:
    Value: !Ref SecuritiesSubnet
    Export:
      Name: lifesync-subnets-SecuritiesSubnetId
  HealthcareSubnetId:
    Value: !Ref HealthcareSubnet
    Export:
      Name: lifesync-subnets-HealthcareSubnetId
  HospitalSubnetId:
    Value: !Ref HospitalSubnet
    Export:
      Name: lifesync-subnets-HospitalSubnetId
