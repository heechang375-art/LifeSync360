AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 CodeBuild Projects (platform / admin)

Resources:
  PlatformBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: lifesync-build-platform
      ServiceRole: !ImportValue lifesync-iam-CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REPO_URI
            Value: !ImportValue lifesync-ecr-PlatformRepoUri
          - Name: AWS_DEFAULT_REGION
            Value: ap-northeast-2
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REPO_URI
                - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
            build:
              commands:
                - docker build -t $ECR_REPO_URI:$IMAGE_TAG .
                - docker push $ECR_REPO_URI:$IMAGE_TAG
                - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest
                - docker push $ECR_REPO_URI:latest
            post_build:
              commands:
                - printf '[{"name":"platform","imageUri":"%s:%s"}]' $ECR_REPO_URI $IMAGE_TAG > imagedefinitions.json
          artifacts:
            files:
              - imagedefinitions.json
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /codebuild/lifesync-platform

  AdminBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: lifesync-build-admin
      ServiceRole: !ImportValue lifesync-iam-CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: ECR_REPO_URI
            Value: !ImportValue lifesync-ecr-AdminRepoUri
          - Name: AWS_DEFAULT_REGION
            Value: ap-northeast-2
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REPO_URI
                - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
            build:
              commands:
                - docker build -t $ECR_REPO_URI:$IMAGE_TAG .
                - docker push $ECR_REPO_URI:$IMAGE_TAG
                - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest
                - docker push $ECR_REPO_URI:latest
            post_build:
              commands:
                - printf '[{"name":"admin","imageUri":"%s:%s"}]' $ECR_REPO_URI $IMAGE_TAG > imagedefinitions.json
          artifacts:
            files:
              - imagedefinitions.json
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /codebuild/lifesync-admin

Outputs:
  PlatformBuildName:
    Value: !Ref PlatformBuild
    Export:
      Name: lifesync-codebuild-PlatformBuildName
  AdminBuildName:
    Value: !Ref AdminBuild
    Export:
      Name: lifesync-codebuild-AdminBuildName
