AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 SNS — 운영 알림 토픽

Parameters:
  AlertEmail:
    Type: String
    Description: 알림 수신 이메일
    Default: ops@lifesync360.com

Resources:
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: lifesync-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

Outputs:
  AlertTopicArn:
    Value: !Ref AlertTopic
    Export:
      Name: lifesync-sns-AlertTopicArn
