AWSTemplateFormatVersion: '2010-09-09'
Description: LifeSync360 CloudWatch Alarms

Resources:
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: lifesync-lambda-errors
      AlarmDescription: Lambda 오류 5분 내 3회 이상
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: lifesync-gcp-result-ingest
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !ImportValue lifesync-sns-AlertTopicArn
      TreatMissingData: notBreaching

  EcsPlatformMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: lifesync-ecs-platform-memory
      AlarmDescription: ECS platform 메모리 85% 이상
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: lifesync-cluster
        - Name: ServiceName
          Value: lifesync-platform
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 85
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !ImportValue lifesync-sns-AlertTopicArn
      TreatMissingData: missing

  AuroraCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: lifesync-aurora-cpu
      AlarmDescription: Aurora CPU 80% 이상
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !ImportValue lifesync-aurora-ClusterId
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !ImportValue lifesync-sns-AlertTopicArn
      TreatMissingData: missing

  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: lifesync-apigw-5xx
      AlarmDescription: API Gateway 5xx 1분 내 10회 이상
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: lifesync-ingest-api
        - Name: Stage
          Value: v1
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !ImportValue lifesync-sns-AlertTopicArn
      TreatMissingData: notBreaching

  DlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: lifesync-dlq-depth
      AlarmDescription: DLQ 메시지 쌓임 — Lambda 실패 발생
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: lifesync-ingest-dlq
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !ImportValue lifesync-sns-AlertTopicArn
      TreatMissingData: notBreaching
