AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Management VPC endpoints for Ansible Control Node (SSM + CodeCommit).
  Deploy AFTER Management VPC/subnet stack. Provides private connectivity to
  SSM (Session Manager, Run Command) and CodeCommit without NAT Gateway.

Parameters:
  ProjectName:
    Type: String
    Default: lifesync
  Environment:
    Type: String
    Default: dev
  ManagementVpcId:
    Type: AWS::EC2::VPC::Id
    Description: Management VPC ID (Ansible Control Node가 위치한 VPC).
  ManagementVpcCidr:
    Type: String
    Description: Management VPC CIDR (인터페이스 엔드포인트 SG 인그레스 443 허용 범위).
  ManagementPrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Ansible Control Node가 위치한 private subnet ID.
  ManagementPrivateRouteTableId:
    Type: String
    Description: Management private subnet 라우트 테이블 ID (S3 Gateway 엔드포인트 연결용).

Resources:
  ManagementVpceSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Interface VPC endpoints HTTPS from Management VPC (SSM / CodeCommit).
      VpcId: !Ref ManagementVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref ManagementVpcCidr
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-sg"

  # S3 Gateway — 무료, Ansible pip install / AWS CLI S3 사용 시 필요
  ManagementVpceS3Gateway:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Gateway
      VpcId: !Ref ManagementVpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      RouteTableIds:
        - !Ref ManagementPrivateRouteTableId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-s3"

  # SSM — SSM Agent 등록 및 Run Command
  ManagementVpceSsm:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      VpcId: !Ref ManagementVpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ssm"
      SubnetIds:
        - !Ref ManagementPrivateSubnetId
      SecurityGroupIds:
        - !Ref ManagementVpceSg
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-ssm"

  # SSM Messages — Session Manager / Run Command 통신
  ManagementVpceSsmMessages:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      VpcId: !Ref ManagementVpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ssmmessages"
      SubnetIds:
        - !Ref ManagementPrivateSubnetId
      SecurityGroupIds:
        - !Ref ManagementVpceSg
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-ssmmessages"

  # EC2 Messages — SSM Agent 기본 통신
  ManagementVpceEc2Messages:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      VpcId: !Ref ManagementVpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ec2messages"
      SubnetIds:
        - !Ref ManagementPrivateSubnetId
      SecurityGroupIds:
        - !Ref ManagementVpceSg
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-ec2messages"

  # CodeCommit API — credential helper 인증 및 레포 메타데이터
  ManagementVpceCodeCommit:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      VpcId: !Ref ManagementVpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.codecommit"
      SubnetIds:
        - !Ref ManagementPrivateSubnetId
      SecurityGroupIds:
        - !Ref ManagementVpceSg
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-codecommit"

  # git-codecommit — git clone/pull HTTPS 실제 데이터 통신
  ManagementVpceGitCodeCommit:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      VpcId: !Ref ManagementVpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.git-codecommit"
      SubnetIds:
        - !Ref ManagementPrivateSubnetId
      SecurityGroupIds:
        - !Ref ManagementVpceSg
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-management-vpc-endpoints-git-codecommit"

Outputs:
  ManagementVpcEndpointsSgId:
    Description: Management VPC endpoints SG ID (필요 시 Ansible EC2 SG 아웃바운드 규칙 참조용).
    Value: !Ref ManagementVpceSg
