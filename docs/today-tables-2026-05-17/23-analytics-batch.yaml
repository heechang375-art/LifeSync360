AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  23 Analytics Batch — analytics_aggregator Lambda + 2 DynamoDB tables + EventBridge cron (DISABLED 초기상태).
  P3 r10 (customer_recommend_daily 적재) + r12 (analytics_segment_performance) + r13 (analytics_demographic_summary) 일배치.
  customer_recommend_daily 테이블은 Aurora 안에 있으므로 별도 SQL 스크립트로 적용 (scripts/data/create-recommend-daily-table.sh).

Parameters:
  ProjectName:
    Type: String
    Default: lifesync
  Environment:
    Type: String
    Default: dev

  LambdaCodeS3Bucket:
    Type: String
    Description: Lambda zip 이 업로드된 S3 버킷 (06-s3 ArtifactBucketName 또는 ScriptBucketName).
  LambdaCodeS3Key:
    Type: String
    Default: lambda/analytics_aggregator/analytics_aggregator.zip
    Description: Lambda zip S3 key.

  AuroraSecretId:
    Type: String
    Default: lifesync/aurora
    Description: Secrets Manager id (host/user/password JSON).
  AuroraDbName:
    Type: String
    Default: lifesync360
  OnpremQueryLambdaName:
    Type: String
    Default: ""
    Description: onprem_customer_query lambda 함수명 (선택). 없으면 segment/demographic 집계는 skip.

  LambdaSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Lambda VPC subnets (Aurora 접근 가능한 private subnet).
  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Lambda SG (Aurora ingress 허용된 SG).

  ScheduleExpression:
    Type: String
    Default: "cron(0 18 * * ? *)"
    Description: EventBridge cron — 매일 03:00 KST (UTC 18:00). 활성화는 ScheduleState=ENABLED 로.
  ScheduleState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: 초기 비활성. 콘솔/cli 로 ENABLED 토글 또는 stack 업데이트.

Resources:
  # ─────────────────── DynamoDB 2 테이블 ───────────────────
  AnalyticsSegmentPerformance:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: analytics_segment_performance
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: snapshot_date, AttributeType: S }
        - { AttributeName: segment_key,   AttributeType: S }
      KeySchema:
        - { AttributeName: snapshot_date, KeyType: HASH  }
        - { AttributeName: segment_key,   KeyType: RANGE }
      Tags:
        - { Key: Project,     Value: !Ref ProjectName }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Purpose,     Value: P3_r12_segment_performance }

  AnalyticsDemographicSummary:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: analytics_demographic_summary
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: snapshot_date, AttributeType: S }
        - { AttributeName: segment_key,   AttributeType: S }
      KeySchema:
        - { AttributeName: snapshot_date, KeyType: HASH  }
        - { AttributeName: segment_key,   KeyType: RANGE }
      Tags:
        - { Key: Project,     Value: !Ref ProjectName }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Purpose,     Value: P3_r13_demographic_summary }

  # ─────────────────── Lambda IAM Role ───────────────────
  AnalyticsAggregatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-analytics-aggregator-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-${Environment}-analytics-aggregator-inline"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AuroraSecretRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AuroraSecretId}-*"
              - Sid: DdbWriteAnalytics
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt AnalyticsSegmentPerformance.Arn
                  - !GetAtt AnalyticsDemographicSummary.Arn
              - Sid: OnpremLambdaInvoke
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"

  # ─────────────────── Lambda Function ───────────────────
  AnalyticsAggregatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-analytics-aggregator"
      Runtime: python3.12
      Handler: handler.handler
      Role: !GetAtt AnalyticsAggregatorRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key:    !Ref LambdaCodeS3Key
      Timeout: 900       # 15분 — 1M 인구통계 집계 여유
      MemorySize: 1024
      Environment:
        Variables:
          AURORA_SECRET_ID      : !Ref AuroraSecretId
          AURORA_DB_NAME        : !Ref AuroraDbName
          DDB_SEGMENT_TABLE     : !Ref AnalyticsSegmentPerformance
          DDB_DEMOGRAPHIC_TABLE : !Ref AnalyticsDemographicSummary
          ONPREM_QUERY_LAMBDA   : !Ref OnpremQueryLambdaName
      VpcConfig:
        SubnetIds        : !Ref LambdaSubnetIds
        SecurityGroupIds : [ !Ref LambdaSecurityGroupId ]
      Tags:
        - { Key: Project,     Value: !Ref ProjectName }
        - { Key: Environment, Value: !Ref Environment }

  AnalyticsAggregatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AnalyticsAggregatorFunction}"
      RetentionInDays: 14

  # ─────────────────── EventBridge cron (DISABLED 초기) ───────────────────
  AnalyticsAggregatorSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-analytics-aggregator-daily"
      Description: "P3 일배치 — analytics_aggregator (03:00 KST). 초기 DISABLED, 콘솔/cli 로 ENABLED 토글."
      ScheduleExpression: !Ref ScheduleExpression
      State: !Ref ScheduleState
      Targets:
        - Id: analytics-aggregator
          Arn: !GetAtt AnalyticsAggregatorFunction.Arn

  AnalyticsAggregatorScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName : !Ref AnalyticsAggregatorFunction
      Action       : lambda:InvokeFunction
      Principal    : events.amazonaws.com
      SourceArn    : !GetAtt AnalyticsAggregatorSchedule.Arn

Outputs:
  AnalyticsAggregatorFunctionName:
    Value: !Ref AnalyticsAggregatorFunction
  AnalyticsAggregatorFunctionArn:
    Value: !GetAtt AnalyticsAggregatorFunction.Arn
  AnalyticsAggregatorRoleArn:
    Value: !GetAtt AnalyticsAggregatorRole.Arn
  SegmentPerformanceTableName:
    Value: !Ref AnalyticsSegmentPerformance
  DemographicSummaryTableName:
    Value: !Ref AnalyticsDemographicSummary
  ScheduleRuleName:
    Value: !Ref AnalyticsAggregatorSchedule
  ScheduleStateNote:
    Value: !Sub "초기 ${ScheduleState}. 활성화: aws events enable-rule --name ${AnalyticsAggregatorSchedule}"
