<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP 종합 건강검진 신청 — LifeSync360</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; color: #0f172a; }
.app { max-width: 560px; margin: 0 auto; padding-bottom: 100px; }
.header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 16px;
          display: flex; align-items: center; justify-content: space-between; }
.header .back { width: 32px; height: 32px; background: #f1f5f9; border-radius: 8px;
                display: flex; align-items: center; justify-content: center; }
.header .title { font-weight: 700; }
.header .spacer { width: 32px; }

.apply-page { padding: 16px; }

.apply-summary { padding: 18px; background: #eff6ff; border: 1px solid #bfdbfe;
                 border-radius: 12px; margin-bottom: 14px; }
.apply-summary .chip { display: inline-block; padding: 3px 10px; background: #3b82f6; color: #fff;
                       border-radius: 999px; font-size: 12px; font-weight: 600; }
.apply-summary .name { font-size: 18px; font-weight: 700; margin-top: 8px; }
.apply-summary .desc { color: #475569; font-size: 13px; margin-top: 4px; line-height: 1.5; }

.applicant-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
                 padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 12px; align-items: center; }
.applicant-icon { width: 38px; height: 38px; border-radius: 999px; background: #f1f5f9;
                  display: flex; align-items: center; justify-content: center; font-size: 18px; }
.applicant-text .label { font-size: 11px; color: #94a3b8; }
.applicant-text .val { font-size: 14px; font-weight: 600; color: #0f172a; }

.terms-section { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
                 padding: 16px; margin-bottom: 14px; }
.terms-section h3 { font-size: 14px; color: #1e40af; margin: 0 0 12px; }

.agree-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px;
             background: #f8fafc; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
.agree-row.checked { background: #eff6ff; }
.agree-row input { margin-top: 2px; accent-color: #3b82f6; flex-shrink: 0; }
.agree-row label { font-size: 13px; color: #475569; line-height: 1.5; flex: 1; }
.agree-row label strong { color: #1e40af; }
.agree-row .terms-link { font-size: 11px; color: #94a3b8; text-decoration: underline; }

.agree-all { background: #1e40af; color: #fff; }
.agree-all label { color: #fff; }
.agree-all label strong { color: #fef3c7; }

.cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px 20px;
       background: linear-gradient(to top, #fff 80%, rgba(255,255,255,0)); max-width: 560px; margin: 0 auto; }
.cta button { width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
              background: #3b82f6; color: #fff; border: 0; border-radius: 12px; }
</style>
</head>
<body>
<div class="app">
    <header class="header">
        <div class="back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </div>
        <span class="title">상품 신청</span>
        <div class="spacer"></div>
    </header>

    <main class="apply-page">
        <div class="apply-summary">
            <span class="chip">헬스케어</span>
            <div class="name">VIP 종합 건강검진</div>
            <div class="desc">VIP 고객 전용 종합 건강검진 패키지 — MRI/CT 포함, 전담 코디네이터 1:1 배정.</div>
        </div>

        <div class="applicant-box">
            <div class="applicant-icon">👤</div>
            <div class="applicant-text">
                <div class="label">신청자 (로그인 정보 자동 적용)</div>
                <div class="val">김철수 · test@lifesync.com</div>
            </div>
        </div>

        <div class="terms-section">
            <h3>약관 동의</h3>

            <div class="agree-row agree-all">
                <input type="checkbox">
                <label><strong>모두 동의</strong> · 필수/선택 약관 일괄 동의</label>
            </div>

            <div class="agree-row checked">
                <input type="checkbox" checked>
                <label>
                    <strong>(필수)</strong> 본 상품 약관 및 신청 정보 활용에 동의합니다.
                    <span class="terms-link">전문 보기 ▶</span>
                </label>
            </div>

            <div class="agree-row checked">
                <input type="checkbox" checked>
                <label>
                    <strong>(필수)</strong> 개인정보 제3자 제공 (담당자 연락 목적) 동의합니다.
                </label>
            </div>

            <div class="agree-row">
                <input type="checkbox">
                <label>
                    (선택) 마케팅 정보 수신 및 혜택 안내에 동의합니다.
                </label>
            </div>
        </div>
    </main>
</div>

<div class="cta">
    <button>신청 제출</button>
</div>
</body>
</html>
