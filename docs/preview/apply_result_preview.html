<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신청 완료 – LifeSync360 (preview)</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
               background: #f8fafc; color: #0f172a; }
        .header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 16px;
                  display: flex; align-items: center; justify-content: space-between; }
        .header .back { width: 32px; height: 32px; background: #f1f5f9; border-radius: 8px;
                        display: flex; align-items: center; justify-content: center; }
        .header .title { font-weight: 700; color: #0f172a; }
        .header .spacer { width: 32px; }
        .apply-page { max-width: 560px; margin: 0 auto; padding: 16px; }
        .apply-result { padding: 40px 24px 32px; text-align: center; background: #f0fdf4;
                         border: 1px solid #86efac; border-radius: 14px; margin-top: 60px; }
        .apply-result .icon { font-size: 56px; margin-bottom: 14px; }
        .apply-result .title { font-size: 20px; font-weight: 700; color: #166534; margin-bottom: 8px; }
        .apply-result .desc { color: #15803d; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .apply-result .app-id { display: inline-block; padding: 8px 14px; background: #fff;
                                 border-radius: 8px; font-family: 'Consolas', monospace; font-size: 13px;
                                 color: #14532d; border: 1px solid #bbf7d0; margin-bottom: 24px; }
        .apply-result a { display: inline-block; padding: 12px 28px;
                          background: #3b82f6; color: #fff; border-radius: 10px;
                          text-decoration: none; font-size: 15px; font-weight: 600; }
        .apply-next { margin-top: 18px; padding: 16px; background: #fff; border: 1px solid #e2e8f0;
                      border-radius: 12px; }
        .apply-next h4 { font-size: 13px; color: #1e40af; margin: 0 0 10px; }
        .apply-next ul { margin: 0; padding-left: 18px; color: #475569; font-size: 13px; line-height: 1.7; }
    </style>
</head>
<body>
    <header class="header">
        <div class="back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </div>
        <span class="title">상품 신청</span>
        <div class="spacer"></div>
    </header>

    <main class="apply-page">
        <div class="apply-result">
            <div class="icon">✅</div>
            <div class="title">신청이 접수되었습니다</div>
            <div class="desc">담당자가 영업일 기준 1~2일 내<br>연락드릴 예정이에요.</div>
            <div class="app-id">신청번호: APP-20260517174532-AABBCC</div>
            <br>
            <a href="#">홈으로 돌아가기</a>
        </div>

        <div class="apply-next">
            <h4>📅 다음 절차 안내</h4>
            <ul>
                <li>담당자 1차 연락 (영업일 1~2일 내, 09~20시 사이)</li>
                <li>상품 상세 안내 + 필요 서류 안내</li>
                <li>최종 신청 확정 (필요 서류 제출 후)</li>
                <li>신청 결과는 마이페이지 &gt; 신청 내역 에서 확인 가능</li>
            </ul>
        </div>
    </main>
</body>
</html>
