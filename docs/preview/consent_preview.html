<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>데이터 활용 동의 – LifeSync360 (preview)</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
               background: #f8fafc; color: #0f172a; }
        .consent-page { max-width: 560px; margin: 0 auto; padding: 24px 16px 96px; }
        .consent-header { text-align: center; margin-bottom: 20px; }
        .consent-header .logo { font-size: 28px; font-weight: 800; color: #1e40af; margin: 0; }
        .consent-header .logo span { color: #3b82f6; }
        .consent-header .sub { color: #64748b; font-size: 14px; margin: 6px 0 0; }
        .consent-toolbar { display: flex; justify-content: space-between; align-items: center;
                           padding: 12px 16px; background: #f1f5f9; border-radius: 12px; margin-bottom: 14px; }
        .consent-toolbar .count { font-weight: 600; color: #1e40af; }
        .consent-toolbar button { padding: 6px 14px; font-size: 13px; border: 1px solid #cbd5e1;
                                  background: #fff; border-radius: 8px; cursor: pointer; }
        .consent-card { display: flex; gap: 12px; padding: 16px; margin-bottom: 12px;
                        background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
                        transition: all .15s; cursor: pointer; position: relative; }
        .consent-card.checked { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 2px 8px rgba(59,130,246,.12); }
        .consent-card .icon { font-size: 28px; line-height: 1; flex-shrink: 0; width: 44px; height: 44px;
                              background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .consent-card.checked .icon { background: #dbeafe; }
        .consent-card .body { flex: 1; min-width: 0; padding-right: 28px; }
        .consent-card .label { font-weight: 700; color: #0f172a; font-size: 15px; margin-bottom: 4px; }
        .consent-card .desc { color: #475569; font-size: 13px; line-height: 1.5; margin-bottom: 6px; }
        .consent-card .scope { color: #94a3b8; font-size: 12px; }
        .consent-card .scope::before { content: '수집 항목: '; color: #64748b; font-weight: 500; }
        .consent-card input[type=checkbox] { position: absolute; top: 16px; right: 16px;
                                              width: 20px; height: 20px; cursor: pointer; accent-color: #3b82f6; }
        .consent-notice { background: #fffbeb; border: 1px solid #fde68a; color: #78350f;
                          padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.6; margin-top: 14px; }
        .consent-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 16px 20px;
                       background: linear-gradient(to top, #fff 80%, rgba(255,255,255,0)); }
        .consent-cta button { width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
                              background: #3b82f6; color: #fff; border: 0; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="consent-page">
    <div class="consent-header">
        <p class="logo">LifeSync<span>360</span></p>
        <p class="sub">맞춤 서비스 제공을 위해 데이터 활용 동의가 필요해요</p>
    </div>

    <div class="consent-toolbar">
        <span class="count"><strong>3</strong> / 8 선택</span>
        <button>전체 선택</button>
    </div>

    <div class="consent-list">
        <label class="consent-card checked">
            <div class="icon">🏦</div>
            <div class="body">
                <div class="label">LS 은행 데이터 활용 동의</div>
                <div class="desc">예금·적금·대출·연금 거래 내역을 분석해 자산 흐름에 맞는 금융 상품을 추천드립니다.</div>
                <div class="scope">계좌 잔액 · 거래 패턴 · 신용 등급</div>
            </div>
            <input type="checkbox" checked>
        </label>

        <label class="consent-card checked">
            <div class="icon">💳</div>
            <div class="body">
                <div class="label">LS 카드 데이터 활용 동의</div>
                <div class="desc">카드 사용 카테고리와 포인트 적립 패턴을 분석해 라이프스타일 맞춤 혜택을 제안드립니다.</div>
                <div class="scope">결제 카테고리 · 사용 금액 · 포인트 적립/사용</div>
            </div>
            <input type="checkbox" checked>
        </label>

        <label class="consent-card">
            <div class="icon">🛡️</div>
            <div class="body">
                <div class="label">LS 보험 데이터 활용 동의</div>
                <div class="desc">보유 보험과 보장 공백을 분석해 필요한 보장을 보완할 보험 상품을 추천드립니다.</div>
                <div class="scope">보험 종목 · 보장 한도 · 만기 정보</div>
            </div>
            <input type="checkbox">
        </label>

        <label class="consent-card">
            <div class="icon">📈</div>
            <div class="body">
                <div class="label">LS 증권 데이터 활용 동의</div>
                <div class="desc">투자 성향과 보유 종목을 기반으로 ETF·펀드·연금 등 투자 상품을 추천드립니다.</div>
                <div class="scope">포트폴리오 · 거래 패턴 · 위험 성향</div>
            </div>
            <input type="checkbox">
        </label>

        <label class="consent-card">
            <div class="icon">📱</div>
            <div class="body">
                <div class="label">LS 다이렉트보험 데이터 활용 동의</div>
                <div class="desc">비대면 가입 이력 기반으로 모바일 간편 보험 상품을 우선 추천드립니다.</div>
                <div class="scope">온라인 가입 이력 · 견적 조회 · 클릭 패턴</div>
            </div>
            <input type="checkbox">
        </label>

        <label class="consent-card checked">
            <div class="icon">💪</div>
            <div class="body">
                <div class="label">LS 헬스케어 데이터 활용 동의</div>
                <div class="desc">건강검진 결과와 측정 데이터로 건강 점수 산출 및 맞춤 헬스·웰니스 프로그램을 제공합니다.</div>
                <div class="scope">검진 결과 · 건강 지표 · 운동/식단 기록</div>
            </div>
            <input type="checkbox" checked>
        </label>

        <label class="consent-card">
            <div class="icon">🏥</div>
            <div class="body">
                <div class="label">LS 협력병원 데이터 활용 동의</div>
                <div class="desc">진료 기록을 기반으로 화상진료·맞춤 보험·건강관리 서비스를 연결해 드립니다.</div>
                <div class="scope">진료/처방 이력 · 예약 정보</div>
            </div>
            <input type="checkbox">
        </label>

        <label class="consent-card">
            <div class="icon">⌚</div>
            <div class="body">
                <div class="label">웨어러블 기기 데이터 활용 동의</div>
                <div class="desc">심박수·걸음수·수면 데이터를 실시간 분석해 동적 건강 점수와 알림을 제공합니다.</div>
                <div class="scope">심박/혈압/SpO2 · 걸음수 · 수면 패턴</div>
            </div>
            <input type="checkbox">
        </label>
    </div>

    <div class="consent-notice">
        최소 1개 이상 동의 시 서비스를 이용할 수 있습니다.<br>
        동의 정보는 언제든 마이페이지에서 철회할 수 있으며, 철회 시 해당 계열사 기반 추천은 즉시 중단됩니다.
    </div>
</div>

<div class="consent-cta">
    <button>저장 후 시작하기</button>
</div>
</body>
</html>
