<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>신청 완료 v2</title>
<style>
* {box-sizing: border-box;} body {margin:0; background:#f8fafc; font-family:-apple-system, 'Noto Sans KR', sans-serif; color:#0f172a;}
.app {max-width:560px; margin:0 auto;}
.header {background:#fff; border-bottom:1px solid #e2e8f0; padding:12px 16px; display:flex; align-items:center; justify-content:space-between;}
.back {width:32px; height:32px; background:#f1f5f9; border-radius:8px; display:flex; align-items:center; justify-content:center;}
.title {font-weight:700;} .spacer{width:32px;}
.apply-page {padding:16px 16px 40px;}

.apply-result .desc {color:#15803d; font-size:14px; line-height:1.6; margin-bottom:20px;}
.apply-result .app-id {display:inline-block; padding:8px 14px; background:#fff; border-radius:8px; font-family:'Consolas',monospace; font-size:13px; color:#14532d; border:1px solid #bbf7d0; margin-bottom:24px;}
.apply-result .next {background:#fff; border:1px solid #bbf7d0; border-radius:10px; padding:14px; margin:16px 0 20px; text-align:left;}
.apply-result .next h4 {font-size:13px; font-weight:700; color:#166534; margin:0 0 8px;}
.apply-result .next ul {margin:0; padding-left:18px; color:#15803d; font-size:12.5px; line-height:1.7;}
.apply-result .home-btn {display:inline-block; padding:12px 28px; background:#3b82f6; color:#fff; border-radius:10px; text-decoration:none; font-size:15px; font-weight:600;}
</style>
</head><body><div class="app">
<header class="header"><div class="back"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div><span class="title">상품 신청</span><div class="spacer"></div></header>
<main class="apply-page"><div class="apply-result">

    <ul>
      <li>담당자 1차 연락 — <strong>영업일 1~2일 내, 09~20시 사이</strong></li>
